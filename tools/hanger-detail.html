<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0d1116" />
<title>Hanger Detail — SprinkFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0d1116; --panel:#171d24; --panel2:#202832; --line:#2d3742; --line-strong:#536171;
    --ink:#f5f7f8; --muted:#aab4bd; --accent:#ffb03a; --accent2:#ff5a2f;
    --good:#3ddc97; --tap:56px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; overflow:hidden; background:var(--bg);
    color:var(--ink); font-family:"Inter", system-ui, -apple-system, sans-serif;
    -webkit-user-select:none; user-select:none; touch-action:none; -webkit-touch-callout:none;}
  #app{display:flex; flex-direction:column; height:100%;}

  /* Top bar */
  header{display:flex; align-items:center; gap:8px;
    padding:max(env(safe-area-inset-top,0px),8px) 10px 8px;
    background:var(--panel); border-bottom:1px solid var(--line); flex:0 0 auto;}
  header .title{font-family:"Space Grotesk","Inter",sans-serif; font-size:15px; font-weight:700; letter-spacing:.2px;
    flex:0 1 auto; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  header .spacer{flex:1 1 0; min-width:0;}
  header .iconbtn{flex:0 0 auto;}   /* buttons never shrink/clip; title yields first on narrow screens */
  .iconbtn{height:40px; min-width:40px; padding:0 12px; border:1px solid var(--line);
    background:var(--panel2); color:var(--ink); border-radius:9px; font-size:13px;
    font-weight:bold; display:inline-flex; align-items:center; gap:6px;}
  .iconbtn:active{background:#39424d;}
  .iconbtn:disabled{opacity:.32; pointer-events:none;}
  .iconbtn#btnHistUndo, .iconbtn#btnHistRedo{padding:0 9px; font-size:17px;}
  .iconbtn.primary{background:linear-gradient(120deg,#ff5a2f,#ffb03a); border-color:transparent; color:#1a0d06;}

  /* Canvas area */
  #stage{position:relative; flex:1 1 auto; min-height:0; overflow:hidden;
    background:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,.045) 1px, transparent 0) 0 0/22px 22px,
      var(--bg);}
  canvas{position:absolute; inset:0; width:100%; height:100%; display:block;
    touch-action:none; -webkit-user-select:none; -webkit-touch-callout:none;}

  /* Hint pill */
  #hint{position:absolute; top:10px; left:50%; transform:translateX(-50%);
    background:rgba(10,12,15,.86); border:1px solid var(--line); color:var(--ink);
    padding:8px 14px; border-radius:20px; font-size:13px; font-weight:bold;
    max-width:88%; text-align:center; pointer-events:none; transition:opacity .2s;}

  /* Zoom controls */
  .zoomctl{position:absolute; right:10px; bottom:10px; display:flex; flex-direction:column; gap:6px;}
  .zoomctl button{width:40px; height:40px; border:1px solid var(--line); background:rgba(35,40,47,.9);
    color:var(--ink); border-radius:10px; font-size:20px; font-weight:bold; line-height:1; display:flex;
    align-items:center; justify-content:center;}
  .zoomctl button:active{background:var(--accent2);}

  /* Bottom toolbar */
  footer{flex:0 0 auto; background:var(--panel); border-top:1px solid var(--line);
    padding:8px 8px calc(8px + env(safe-area-inset-bottom));}
  .tools{display:flex; gap:6px;}
  .tool{flex:1; height:var(--tap); border:1px solid var(--line); background:var(--panel2);
    color:var(--ink); border-radius:11px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:2px; font-size:11px; font-weight:bold;}
  .tool .ic{font-size:19px; line-height:1;}
  .tool[aria-disabled="true"]{opacity:.38;}
  .tool.active{background:var(--accent2); border-color:var(--accent); box-shadow:0 0 0 2px rgba(255,176,58,.3) inset;}
  .tool .done{position:absolute; transform:translate(16px,-15px); color:var(--good); font-size:13px;}
  .toolwrap{position:relative; flex:1; display:flex;}

  /* Bottom sheet */
  .sheet-back{position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; z-index:30;}
  .sheet-back.show{display:block;}
  .sheet{position:absolute; left:0; right:0; bottom:0; background:var(--panel);
    border-top-left-radius:18px; border-top-right-radius:18px; padding:14px 14px calc(18px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line); transform:translateY(100%); transition:transform .22s ease;}
  .sheet-back.show .sheet{transform:translateY(0);}
  .sheet h3{margin:2px 0 12px; font-size:15px;}
  .sheet .sub{color:var(--muted); font-weight:normal; font-size:12px; margin-left:6px;}
  .opt{display:flex; align-items:center; gap:12px; width:100%; padding:13px;
    border:1px solid var(--line); background:var(--panel2); color:var(--ink);
    border-radius:12px; margin-bottom:8px; font-size:14px; font-weight:bold; text-align:left;}
  .opt small{display:block; color:var(--muted); font-weight:normal; font-size:12px; margin-top:2px;}
  .opt .gico{font-size:24px; width:30px; text-align:center;}
  .opt[disabled]{opacity:.4;}
  .opt.sel{border-color:var(--accent); box-shadow:0 0 0 2px rgba(255,176,58,.3) inset;}
  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{padding:10px 14px; border:1px solid var(--line); background:var(--panel2);
    color:var(--ink); border-radius:20px; font-size:14px; font-weight:bold;}
  .chip.sel{background:var(--accent2); border-color:var(--accent);}
  .fieldlbl{font-size:12px; color:var(--muted); margin:6px 2px 5px;}
  .iconrow{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:4px;}
  .miniopt{width:50px; height:46px; border:1px solid var(--line); background:var(--panel2);
    color:var(--ink); border-radius:10px; font-size:20px; line-height:1; display:flex;
    align-items:center; justify-content:center; cursor:pointer;}
  .miniopt.sel{background:var(--accent2); border-color:var(--accent); color:#1a0d06;}
  .sheet .row{display:flex; gap:8px; margin-top:6px;}
  .sheet .ghost{flex:1; height:46px; border:1px solid var(--line); background:transparent;
    color:var(--muted); border-radius:11px; font-size:14px; font-weight:bold;}
  .field{margin:4px 0 14px;}
  .field label{display:block; font-size:12px; color:var(--muted); margin-bottom:5px;}
  .field input{width:100%; height:44px; background:var(--panel2); border:1px solid var(--line);
    color:var(--ink); border-radius:10px; padding:0 12px; font-size:15px; font-family:inherit;}
</style>
<link rel="manifest" href="../manifest.webmanifest" />
<link rel="icon" href="../assets/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="../assets/logo.png" />
</head>
<body>
<div id="app">
  <header>
    <a class="iconbtn" href="../index.html" aria-label="Back to SprinkFlow" style="text-decoration:none;">‹</a>
    <span class="title">Hanger Detail</span>
    <span class="spacer"></span>
    <button class="iconbtn" id="btnHistUndo" aria-label="Undo" title="Undo" disabled>↶</button>
    <button class="iconbtn" id="btnHistRedo" aria-label="Redo" title="Redo" disabled>↷</button>
    <button class="iconbtn" id="btnEdit" aria-label="Options">⚙</button>
    <button class="iconbtn" id="btnUndo">↺ Reset</button>
    <button class="iconbtn" id="btnDxf">⤓ DXF</button>
    <button class="iconbtn primary" id="btnExport">⤓ PNG</button>
  </header>

  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="hint">Tap <b>Pipe</b> to pick a size, then tap the canvas to place it.</div>
    <div class="zoomctl">
      <button id="btnZoomOut" title="Zoom out">−</button>
      <button id="btnFit" title="Fit to screen">⤢</button>
      <button id="btnZoomIn" title="Zoom in">+</button>
    </div>
  </div>

  <footer>
    <div class="tools" id="tools">
      <div class="toolwrap"><button class="tool" data-tool="pipe"><span class="ic">⬤</span>Pipe<span class="done" data-done="pipe" hidden>✓</span></button></div>
      <div class="toolwrap"><button class="tool" data-tool="ring" aria-disabled="true"><span class="ic">◎</span>Ring<span class="done" data-done="ring" hidden>✓</span></button></div>
      <div class="toolwrap"><button class="tool" data-tool="structure"><span class="ic">▤</span>Structure<span class="done" data-done="structure" hidden>✓</span></button></div>
      <div class="toolwrap"><button class="tool" data-tool="fastener" aria-disabled="true"><span class="ic">⚓</span>Fastener<span class="done" data-done="fastener" hidden>✓</span></button></div>
    </div>
  </footer>
</div>

<!-- Bottom sheets -->
<div class="sheet-back" id="sheetBack">
  <div class="sheet" id="sheet"></div>
</div>

function undo(){ if(histIndex>0){ histIndex--; restoreState(history[histIndex]); setTool(null); updateUI(); draw(); updateHistUI(); } }
function redo(){ if(histIndex<history.length-1){ histIndex++; restoreState(history[histIndex]); setTool(null); updateUI(); draw(); updateHistUI(); } }
function updateHistUI(){
  const u=document.getElementById('btnHistUndo'), r=document.getElementById('btnHistRedo');
  if(u) u.disabled = histIndex<=0;
  if(r) r.disabled = histIndex>=history.length-1;
}

/* ============================================================
   Canvas / DPI fit
   ============================================================ */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let view = {scale:1, ox:0, oy:0, dpr:1};   // fits the whole fixed sheet to the screen

function fitCanvas(){
  const stage = document.getElementById('stage');
  const dpr = window.devicePixelRatio || 1;
  const w = stage.clientWidth, h = stage.clientHeight;
  cv.width = Math.round(w*dpr); cv.height = Math.round(h*dpr);
  // fit virtual W×H (the fixed sheet) into w×h with margin
  const m = 10;
  const s = Math.min((w-2*m)/W, (h-2*m)/H);
  view = { scale:s, ox:(w - W*s)/2, oy:(h - H*s)/2, dpr };
  draw();
}
window.addEventListener('resize', fitCanvas);

// Detail zoom: scales the DRAWING content within the fixed sheet (not the page).
// Pipe Y is rescaled around the deck top so sizes + spacing zoom uniformly.
function setDetailScale(ds){
  ds = clamp(ds, 0.45, 3.6);   // max zoom raised from 2.4 (≈50% more zoom-in)
  if(state.pipe){
    const k = ds/state.detailScale;
    state.pipe.y = DECK_TOP + (state.pipe.y - DECK_TOP)*k;
  }
  state.detailScale = ds;
  if(state.pipe){
    const [yMin,yMax]=pipeYRange(state.pipe.npsIndex);
    state.pipe.y = clamp(state.pipe.y, yMin, yMax);
  }
  draw();
}
document.getElementById('btnZoomIn').onclick =()=>{ setDetailScale(state.detailScale*1.18); commitSoon(); };
document.getElementById('btnZoomOut').onclick=()=>{ setDetailScale(state.detailScale*0.85); commitSoon(); };
document.getElementById('btnFit').onclick    =()=>{ setDetailScale(1); commitSoon(); };
document.getElementById('btnHistUndo').onclick=undo;
document.getElementById('btnHistRedo').onclick=redo;
window.addEventListener('keydown', e=>{
  if(!(e.ctrlKey||e.metaKey)) return;
  const k=e.key.toLowerCase();
  if(k==='z' && !e.shiftKey){ e.preventDefault(); undo(); }
  else if((k==='z' && e.shiftKey) || k==='y'){ e.preventDefault(); redo(); }
});

function toDetail(clientX, clientY){
  const r = cv.getBoundingClientRect();
  const x = (clientX - r.left - view.ox)/view.scale;
  const y = (clientY - r.top  - view.oy)/view.scale;
  return {x,y};
}

/* ============================================================
   DRAWING — all primitives in detail space.
   render(g) draws the whole detail; used for both screen + export.
   ============================================================ */
function render(g, opts){
  opts = opts || {};
  // paper
  if(opts.paper){ g.fillStyle="#ffffff"; g.fillRect(0,0,W,H); }
  g.lineJoin="round"; g.lineCap="round";
  g.textBaseline="alphabetic";

  drawBorder(g);
  drawStructure(g);
  drawFastener(g);
  drawRod(g);            // rod BEHIND the ring so the ring hanger reads as in front
  drawSurge(g);          // surge restraint BEHIND the ring (ring hanger reads in front)
  drawRingAndPipe(g);
  drawKeynotes(g);
  drawTitleBlock(g);

  if(!opts.paper) drawGhostHelpers(g);
}

function ink(g, w){ g.strokeStyle="#111418"; g.lineWidth=w; }
function L(g,x1,y1,x2,y2){ g.beginPath(); g.moveTo(x1,y1); g.lineTo(x2,y2); g.stroke(); }

function drawBorder(g){
  ink(g,2.2); g.strokeRect(28,28,W-56,H-56);
}

/* ---------- Structure: concrete deck with hatch ---------- */
// deterministic PRNG so the aggregate scatter is stable across redraws
function mulberry32(a){
  return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15, 1|a);
    t=t+Math.imul(t^t>>>7, 61|t)^t; return ((t^t>>>14)>>>0)/4294967296; };
}
function drawStructure(g){
  if(state.structure==='woodbeam') return (state.fastener==='woodside') ? drawWoodSection(g) : drawWoodBeam(g);
  if(state.structure!=='concrete') return;
  const x0=70, x1=W-70, yT=DECK_TOP, yB=deckBot();
  g.save();
  g.beginPath(); g.rect(x0,yT,x1-x0,yB-yT); g.clip();
  g.fillStyle="#ffffff"; g.fillRect(x0,yT,x1-x0,yB-yT);
  // concrete aggregate symbol (AutoCAD AR-CONC style): fine sand stipple +
  // small "x" marks + OUTLINED aggregate triangles. Stable via seeded PRNG.
  const rnd=mulberry32(20260619);
  const area=(x1-x0)*(yB-yT);
  const rx=()=> x0+(x1-x0)*rnd();
  // 1) fine sand stipple (light, dense)
  g.fillStyle="#aab2bb";
  for(let i=0, n=Math.round(area/300); i<n; i++){
    g.beginPath(); g.arc(rx(), yT+3+(yB-yT-6)*rnd(), 0.5+rnd()*0.5, 0, 7); g.fill();
  }
  // 2) small x marks
  g.strokeStyle="#6f7884"; g.lineWidth=0.8;
  for(let i=0, n=Math.round(area/3000); i<n; i++){
    const px=rx(), py=yT+6+(yB-yT-12)*rnd(), s=2+rnd()*1.4;
    g.beginPath(); g.moveTo(px-s,py-s); g.lineTo(px+s,py+s); g.moveTo(px-s,py+s); g.lineTo(px+s,py-s); g.stroke();
  }
  // 3) outlined aggregate triangles (sparse, varied size + rotation)
  g.strokeStyle="#5c6671"; g.lineWidth=0.9;
  for(let i=0, n=Math.round(area/5200); i<n; i++){
    const px=rx(), py=yT+8+(yB-yT-16)*rnd(), s=4+rnd()*4, rot=rnd()*6.283;
    g.beginPath();
    for(let k=0;k<3;k++){ const a=rot+k*2.0944, ax=px+Math.cos(a)*s, ay=py+Math.sin(a)*s; if(k)g.lineTo(ax,ay); else g.moveTo(ax,ay); }
    g.closePath(); g.stroke();
  }
  g.restore();
  // top + bottom edges (bottom heavier = structural underside)
  ink(g,1.4); L(g,x0,yT,x1,yT);
  ink(g,2.4); L(g,x0,yB,x1,yB);
}

// Wood member shown in side view (a 2x6 board), AutoCAD-style wood hatch:
// gently wavy long-grain lines along the length + a couple of knots.
function drawWoodBeam(g){
  const x0=70, x1=W-70, yT=DECK_TOP, yB=deckBot(), H=yB-yT;
  g.save(); g.beginPath(); g.rect(x0,yT,x1-x0,H); g.clip();
  g.fillStyle="#ffffff"; g.fillRect(x0,yT,x1-x0,H);
  // long grain lines (parallel to length, slightly wavy + uneven spacing)
  g.strokeStyle="#c39a63"; g.lineWidth=0.8;
  const rows=8;
  for(let r=1;r<rows;r++){
    const base=yT + H*(r/rows) + ((r*7)%5-2);
    g.beginPath();
    for(let x=x0;x<=x1;x+=7){ const yy=base + Math.sin((x-x0)/52 + r*0.9)*1.7; (x===x0)?g.moveTo(x,yy):g.lineTo(x,yy); }
    g.stroke();
  }
  // knots (concentric ellipses where grain swirls)
  g.strokeStyle="#9c7038"; g.lineWidth=1.0;
  const knots=[[x0+(x1-x0)*0.32, yT+H*0.42],[x0+(x1-x0)*0.71, yT+H*0.6]];
  for(const [kx,ky] of knots){ for(let i=1;i<=3;i++){ g.beginPath(); g.ellipse(kx,ky,i*3.4,i*2.1,0.2,0,7); g.stroke(); } }
  g.restore();
  // board edges (bottom heavier = the mounting face)
  ink(g,1.6); L(g,x0,yT,x1,yT);
  ink(g,2.4); L(g,x0,yB,x1,yB);
}

// Shared side-mount (SWG) geometry so the beam, screw, and rod all line up.
// The all-thread rod hangs at the pipe centerline (x); the beam sits just left of
// it, its mounting (right) face at xR; the screw enters that face at mid-height.
function swgGeom(){
  const x = state.pipe ? state.pipe.x : AXIS;
  const e = E();
  const k = 0.5*e;                      // px per trace unit (≈ true scale of the SWG geometry)
  const wB = 2.8*e;                     // board thickness shown (covers the embedded thread length)
  const xR = x - 1.0*k;                 // mounting (right) face — head proud to its right, threads into it
  const beamH = 7.4*e;
  const yT = DECK_TOP, yB = DECK_TOP + beamH;
  const screwY = yT + beamH*0.5;        // socket center = rod-attach point (vertical middle = middle 1/3)
  return { x, e, k, wB, xR, xL:xR-wB, yT, yB, beamH, screwY, ox:x, oy:screwY };
}
function swgKey(){ return SWG[state.swgSize] ? state.swgSize : '20'; }

// Wood member for the side-mount SAMMY: a vertical 2x board shown in elevation with
// the SAME wood-grain hatch as drawWoodBeam (grain runs along the length = vertical).
// The screw enters the right (mounting) face; the rod drops below.
function drawWoodSection(g){
  const s = swgGeom();
  const xL=s.xL, xR=s.xR, yT=s.yT, yB=s.yB, w=xR-xL, h=yB-yT;
  g.save(); g.beginPath(); g.rect(xL,yT,w,h); g.clip();
  g.fillStyle="#ffffff"; g.fillRect(xL,yT,w,h);
  // vertical long-grain lines (slightly wavy, uneven spacing)
  g.strokeStyle="#c39a63"; g.lineWidth=0.8;
  const cols=6;
  for(let c=1;c<cols;c++){
    const base=xL + w*(c/cols) + ((c*7)%5-2);
    g.beginPath();
    for(let y=yT;y<=yB;y+=7){ const xx=base + Math.sin((y-yT)/52 + c*0.9)*1.6; (y===yT)?g.moveTo(xx,y):g.lineTo(xx,y); }
    g.stroke();
  }
  // knots (concentric ellipses, tall to follow the vertical grain)
  g.strokeStyle="#9c7038"; g.lineWidth=1.0;
  const knots=[[xL+w*0.42, yT+h*0.30],[xL+w*0.60, yT+h*0.72]];
  for(const [kx,ky] of knots){ for(let i=1;i<=3;i++){ g.beginPath(); g.ellipse(kx,ky,i*2.0,i*3.3,0.15,0,7); g.stroke(); } }
  g.restore();
  // board edges (right / mounting face heavier)
  ink(g,1.6); g.strokeRect(xL,yT,w,h);
  ink(g,2.4); L(g,xR,yT,xR,yB);
}

// Side-mount SAMMY (SWG) — real ITW traced geometry (SWG[swgKey()]). Origin = head
// socket center = rod-attach point; threads point -x into the board. Drawn over a
// white cutaway so it reads cleanly through the wood grain; rod hangs from the socket.
function drawSideSammy(g){
  const s=swgGeom();
  let seg = SWG[swgKey()]; if(!seg) return;
  const k=s.k;
  const TX = tx => s.ox + tx*k;
  const TY = ty => s.oy - ty*k;                 // trace y-up -> canvas y-down
  // drop the socket bore circle at the head center (concentric rings r<0.45) — owner request
  seg = seg.filter(sg=> !(Math.hypot(sg[0],sg[1])<0.45 && Math.hypot(sg[2],sg[3])<0.45));
  const cs = seg.map(sg=>[TX(sg[0]),TY(sg[1]),TX(sg[2]),TY(sg[3])]);   // canvas-space segments
  // Mask the embedded portion (left of the mounting face) to the screw's OUTLINE, not a
  // bounding box: fill the per-x min/max-y silhouette so the wood grain abuts the threaded
  // shank instead of a rectangular white halo. The proud head is over white bg (no mask).
  const inSeg = cs.filter(c=> c[0] < s.xR || c[2] < s.xR);
  if(inSeg.length){
    let mx0=1e9; for(const c of inSeg) mx0=Math.min(mx0,c[0],c[2]);
    const x0=Math.floor(mx0), x1=Math.ceil(s.xR);
    const top=[], bot=[];
    for(let X=x0; X<=x1; X++){
      let ymin=1e9, ymax=-1e9;
      for(const c of inSeg){
        const lo=Math.min(c[0],c[2]), hi=Math.max(c[0],c[2]);
        if(X<lo-0.001 || X>hi+0.001) continue;
        if(Math.abs(c[2]-c[0])<0.001){ ymin=Math.min(ymin,c[1],c[3]); ymax=Math.max(ymax,c[1],c[3]); }
        else { const y=c[1]+(c[3]-c[1])*((X-c[0])/(c[2]-c[0])); if(y<ymin)ymin=y; if(y>ymax)ymax=y; }
      }
      if(ymax>=ymin){ top.push([X,ymin-0.6]); bot.push([X,ymax+0.6]); }
    }
    if(top.length>1){
      g.fillStyle="#ffffff"; g.beginPath();
      g.moveTo(top[0][0],top[0][1]);
      for(let i=1;i<top.length;i++) g.lineTo(top[i][0],top[i][1]);
      for(let i=bot.length-1;i>=0;i--) g.lineTo(bot[i][0],bot[i][1]);
      g.closePath(); g.fill();
    }
  }
  // screw line work
  ink(g,1.0);
  g.beginPath();
  for(const c of cs){ g.moveTo(c[0],c[1]); g.lineTo(c[2],c[3]); }
  g.stroke();
}

/* ---------- Fastener (wedge anchor) + all-thread rod ---------- */
function rodSize(){
  // NFPA 13 hanger-rod diameter by pipe size (3/8" through 4", 1/2" above)
  if(!state.pipe) return '3/8"';
  return PIPES[state.pipe.npsIndex].od <= 4.5 ? '3/8"' : '1/2"';
}
// SAMMY screw hangers are 3/8"-rod only -> available for 4" pipe and smaller, NOT 6"
const SAMMY_FASTENERS = ['concretesammy','woodvertical','woodside'];
function pipeAllowsSammy(){ return !!state.pipe && PIPES[state.pipe.npsIndex].od <= 4.5; }

function geom(){
  const p = state.pipe;
  if(!p) return null;
  const od = PIPES[p.npsIndex].od;
  const pipeR = od*E()/2;   // true scale, no floor (rod is the size reference)
  const rd = ringData(p.npsIndex);
  // top of the swivel socket (where the rod lands) from the real ring geometry, in px
  const ringTopPx = rd ? rd.topY*E() : (pipeR + 30);
  const ringR = rd ? rd.boreR*E() : (pipeR + 11);  // bore radius (for hit-test/keynote)
  // rod end: ring socket top, or — when "extend rod to top of pipe" is on — the
  // top of the pipe OD; no ring → just above the pipe
  const bossTop = state.ring
    ? (state.rodToPipe ? (p.y - pipeR) : (p.y - ringTopPx))
    : (p.y - pipeR - 24);
  // where the rod meets the fastener: flush at the deck underside (drop-in / cast-in
  // insert — rod threads up inside), or below a protruding nut/collar (wedge / SAMMY)
  const hwp = rodHwPx();
  let rodTop = deckBot();
  if(state.fastener==='dropin') rodTop = deckBot() - 0.6875*E();      // rod threads 11/16" up into HDI
  else if(state.fastener==='wedge') rodTop = deckBot() + hwp*2.4;     // below washer + hex nut
  else if(state.fastener==='woodvertical')  rodTop = sammyCanvasY('gst', SAMMY_CFG.gst.rodY); // below the seated collar
  else if(state.fastener==='concretesammy') rodTop = sammyCanvasY('cst', SAMMY_CFG.cst.rodY); // below the seated collar
  else if(state.fastener==='kwikbolt')      rodTop = kwikCoupling().cBot;                     // rod feeds into the coupling bottom
  else if(state.fastener==='woodside'){ const sg=swgGeom(); rodTop = sg.screwY + 0.722*sg.k - 1.5; } // rod emerges from the BOTTOM edge of the SWG head (not mid-nut)
  return {p, pipeR, ringR, bossTop, rodTop, nutY:rodTop, od, rd, ringTopPx};
}

function drawFastener(g){
  const G = geom(); if(!G || !state.structure) return;
  const x = state.pipe.x, db = deckBot();
  switch(state.fastener){
    case 'dropin':        drawDropIn(g, x); break;
    case 'wedge':         drawWedge(g, x); break;
    case 'kwikbolt':      drawKwikBolt(g, x); break;
    case 'castin':        drawCastIn(g, x); break;
    case 'concretesammy': drawSammyPart(g, x, db, 'cst'); break;  // real ITW CST trace
    case 'woodvertical':  drawSammyPart(g, x, db, 'gst'); break;  // real ITW GST trace
    case 'woodside':      drawSideSammy(g); break;                // clean parametric SWG side-mount
  }
}

// Render a real traced ITW SAMMY screw (SAMMY[key]) anchored at (ax,ay) = the
// rod-attach point. Canonical units: stud thickness = 1, screw points up (vertical
// parts) or into -x (side); scaled to the rod diameter. White mask hides the
// structure hatch behind the body.
const SAMMY_FLIP = { gst:-1, cst:-1, swg:1 };   // GST/CST traced upside-down -> flip vertical
const SAMMY_SCALE = { gst:0.72, cst:0.72, swg:0.5 }; // display scale per part (tunable)
// Per-part seating: flushY = canonical y seated at the structure face (screw threads
// up into the member, this point flush at the underside); rodY = canonical y where the
// all-thread rod attaches (rod starts here); cropY = drop trace below this (removes the
// loose/extra hex nut captured in the sales-drawing trace).
const SAMMY_CFG = {
  gst: { flushY:-7.6, rodY:-10.8, cropY:-11.0, vertical:true },  // vertical wood screw
  cst: { flushY:-5.3, rodY:-7.6,  cropY:-8.0,  vertical:true },  // concrete screw
  swg: { flushY:0,    rodY:0,     cropY:null },                  // side-mount (different axis) — untouched
};
function sammyK(key){ const rdd=(rodSize()==='1/2"')?0.5:0.375; return rdd*E()*(SAMMY_SCALE[key]||0.72); }
// canvas y for a canonical y of part `key`, seated at the structure underside (deckBot)
function sammyCanvasY(key, sy){
  const c=SAMMY_CFG[key]||{flushY:0}, fy=SAMMY_FLIP[key]||1;
  return deckBot() + (sy - c.flushY)*fy*sammyK(key);
}
function drawSammyPart(g, ax, ay, key){
  const part = SAMMY[key]; if(!part || !part.seg) return;
  const k = sammyK(key);                          // px per canonical unit
  const fy = SAMMY_FLIP[key] || 1;                // vertical flip per part
  const cfg = SAMMY_CFG[key] || {flushY:0, cropY:null};
  let seg = part.seg;
  if(cfg.cropY!=null) seg = seg.filter(s=> s[1] > cfg.cropY && s[3] > cfg.cropY); // drop the loose nut
  const TX = (sx)=> ax + sx*k;
  const TY = (sy)=> ay + (sy - cfg.flushY)*fy*k;  // seat flushY at ay (structure underside)
  // White mask hides the structure hatch behind the screw. For a vertical screw seated
  // into the member, mask ONLY the in-structure portion (the shank) down to the structure
  // face (ay) — so the structure extends right up to the screw, not the wider collar.
  g.fillStyle="#ffffff";
  if(cfg.vertical){
    const inStruct = seg.filter(s=> TY(s[1]) < ay-0.5 || TY(s[3]) < ay-0.5);
    if(inStruct.length){
      let mx0=1e9,mx1=-1e9,my0=1e9;
      for(const s of inStruct){ mx0=Math.min(mx0,TX(s[0]),TX(s[2])); mx1=Math.max(mx1,TX(s[0]),TX(s[2])); my0=Math.min(my0,TY(s[1]),TY(s[3])); }
      g.fillRect(mx0-1, my0-1, (mx1-mx0)+2, (ay-my0)+2);
    }
  } else {
    let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
    for(const s of seg){ x0=Math.min(x0,TX(s[0]),TX(s[2])); x1=Math.max(x1,TX(s[0]),TX(s[2])); y0=Math.min(y0,TY(s[1]),TY(s[3])); y1=Math.max(y1,TY(s[1]),TY(s[3])); }
    g.fillRect(x0-1, y0-1, (x1-x0)+2, (y1-y0)+2);
  }
  ink(g,1.0);
  g.beginPath();
  for(const s of seg){ g.moveTo(TX(s[0]),TY(s[1])); g.lineTo(TX(s[2]),TY(s[3])); }
  g.stroke();
}

// Wedge / expansion anchor (Kwik-Bolt style): threaded stud embedded in the deck
// with an expansion clip near the embedded end; protrudes below the slab with a
// washer + hex nut, then the all-thread rod continues below.
function drawWedge(g, x){
  const hw=rodHwPx(), ty=DECK_TOP+12, db=deckBot();
  ink(g,1.4);
  L(g, x-hw, ty, x-hw, db); L(g, x+hw, ty, x+hw, db);
  ink(g,0.6); const sp=Math.max(2.4, hw*1.9);
  for(let y=ty+sp; y<db-1; y+=sp) L(g, x-hw, y, x+hw, y);
  // expansion clip splaying out near the embedded (upper) end
  ink(g,1.3);
  g.beginPath(); g.moveTo(x-hw, ty+10); g.lineTo(x-hw-hw*0.9, ty+2); g.lineTo(x-hw, ty+4); g.stroke();
  g.beginPath(); g.moveTo(x+hw, ty+10); g.lineTo(x+hw+hw*0.9, ty+2); g.lineTo(x+hw, ty+4); g.stroke();
  // washer + hex nut at the slab underside
  const nw=hw*1.9, nh=hw*2.2, ww=hw*2.7;
  ink(g,1.6); L(g, x-ww, db, x+ww, db);
  g.fillStyle="#ffffff"; g.beginPath(); g.rect(x-nw, db, nw*2, nh); g.fill(); g.stroke();
  L(g, x-nw, db+nh/2, x+nw, db+nh/2);
}

// Hilti Kwik Bolt TZ2 (wedge anchor) used as a HANGER attachment via a rod coupling.
// Embedded body (expansion clip + shaft) is the real DXF trace, scaled so the shaft = rod
// diameter. Below the deck a threaded stud receives a rod coupling (rectangle slightly wider
// than the rod), and the all-thread rod feeds into the coupling. state.kwikReveal (inches)
// sets the threads shown above the coupling — adjustable up/down.
function kwikScale(){ const rdd=(rodSize()==='1/2"')?0.5:0.375; return rdd*E(); } // px per canonical unit (shaft=rod dia)
function kwikCoupling(){
  const db=deckBot(), rdd=(rodSize()==='1/2"')?0.5:0.375;
  const cTop = db + state.kwikReveal*E();   // revealed threads between the deck and the coupling
  const cH   = rdd*E()*2.8;                  // coupling height (~2.8× rod dia)
  return { cTop, cBot:cTop+cH, cH };
}
function drawKwikBolt(g, x){
  const db=deckBot(), k=kwikScale(), hw=rodHwPx(), c=kwikCoupling();
  // 1) embedded anchor body (DXF clip + shaft), clipped to the deck band
  g.save();
  g.beginPath(); g.rect(28, DECK_TOP, W-56, db-DECK_TOP); g.clip();
  // white mask behind the embedded body (hide the concrete hatch)
  let x0=1e9,x1=-1e9,y0=1e9,y1=-1e9;
  for(const s of KWIK.seg){ const ax=x+s[0]*k,bx=x+s[2]*k,ay=db-s[1]*k,by=db-s[3]*k;
    x0=Math.min(x0,ax,bx); x1=Math.max(x1,ax,bx); y0=Math.min(y0,ay,by); y1=Math.max(y1,ay,by); }
  const my0=Math.max(y0,DECK_TOP);
  g.fillStyle="#ffffff"; g.fillRect(x0-1, my0-1, (x1-x0)+2, (Math.min(db,y1)-my0)+2);
  ink(g,1.3);
  g.beginPath();
  for(const s of KWIK.seg){ g.moveTo(x+s[0]*k, db-s[1]*k); g.lineTo(x+s[2]*k, db-s[3]*k); }
  g.stroke();
  g.restore();
  // 2) protruding threaded stud (rod-width), from the deck underside down into the coupling
  drawAllThread(g, x, db, c.cTop + c.cH*0.6, false, hw);
  // 3) rod coupling: rectangle slightly wider than the rod (white-filled, covers the stud end)
  const cw = Math.max(hw*1.5, hw+2.5);
  ink(g,1.7); g.fillStyle="#ffffff";
  g.beginPath(); g.rect(x-cw, c.cTop, cw*2, c.cH); g.fill(); g.stroke();
  // (the all-thread rod is drawn by drawRod from rodTop = c.cBot, feeding into the coupling)
}

// Cast-in concrete insert (malleable iron, by others): dovetail body cast into the
// slab with an internally-threaded bore; rod threads up into it flush at the underside.
function drawCastIn(g, x){
  const hw=rodHwPx(), bw=Math.max(7, hw*2.4), fl=hw*0.9, ty=DECK_TOP+8, db=deckBot();
  ink(g,1.6); g.fillStyle="#ffffff";
  g.beginPath();
  g.moveTo(x-bw, db); g.lineTo(x-bw, ty+7); g.lineTo(x-bw-fl, ty); g.lineTo(x+bw+fl, ty);
  g.lineTo(x+bw, ty+7); g.lineTo(x+bw, db); g.closePath(); g.fill(); g.stroke();
  // internal threaded bore, open at the underside
  ink(g,1.0);
  L(g, x-hw, db, x-hw, ty+11); L(g, x+hw, db, x+hw, ty+11); L(g, x-hw, ty+11, x+hw, ty+11);
  ink(g,0.6); const sp=Math.max(2.2, hw*1.7);
  for(let y=db-3; y>ty+13; y-=sp) L(g, x-hw, y, x+hw, y);
}

// All-thread rod, drawn BEFORE the ring so the ring occludes it (ring in front).
// Rod width is drawn to true scale (3/8" or 1/2") off the pipe/ring scale.
function rodHwPx(){
  const dia = (rodSize()==='1/2"') ? 0.5 : 0.375;   // rod diameter, inches
  return dia*E()/2;                                  // true half-width, px (scales with detail)
}
function drawRod(g){
  const G = geom(); if(!G || !state.fastener) return;
  drawAllThread(g, state.pipe.x, G.rodTop, G.bossTop, !state.ring, rodHwPx());
}

// Hilti HDI drop-in anchor: hollow internally-threaded sleeve, set flush in deck.
// Rod threads up into it from the underside (no protruding nut/washer).
function drawDropIn(g, x){
  // True scale: OD ≈ rod dia + 1/8" (≈1/2" sleeve for 3/8" rod, 5/8" for 1/2" rod),
  // 2" embedment up from the slab underside; rod threads 11/16" up into the bore.
  const rdd = (rodSize()==='1/2"') ? 0.5 : 0.375;
  const aw = ((rdd + 0.125)/2) * E();     // outer half-width
  const hw = rodHwPx();                    // internal threaded bore = rod radius
  const by = deckBot();                    // flush at slab underside
  const ty = by - 2*E();                   // 2" embedment
  ink(g,1.6); g.fillStyle="#ffffff";
  g.beginPath(); g.rect(x-aw, ty, aw*2, by-ty); g.fill(); g.stroke();
  // internal threaded bore (open at underside), capped by the expander plug near the top
  const plug = ty + 0.32*E();
  ink(g,1.0);
  L(g, x-hw, by, x-hw, plug); L(g, x+hw, by, x+hw, plug); L(g, x-hw, plug, x+hw, plug);
  // expander plug / cone at the embedded end
  ink(g,0.9);
  g.beginPath(); g.moveTo(x-aw, ty); g.lineTo(x-hw, plug); g.stroke();
  g.beginPath(); g.moveTo(x+aw, ty); g.lineTo(x+hw, plug); g.stroke();
}

function drawAllThread(g, x, y1, y2, drawNut, hw){
  if(y2<=y1) return;
  hw = hw || 5; // true half-width of rod in px
  ink(g,1.2);
  L(g, x-hw, y1, x-hw, y2);
  L(g, x+hw, y1, x+hw, y2);
  // horizontal thread crests (pitch scales with rod size)
  ink(g,0.6);
  const sp = Math.max(2.4, hw*1.9);
  for(let y=y1+sp; y<y2-1; y+=sp){ L(g, x-hw, y, x+hw, y); }
  if(drawNut){ // standalone hex nut (only when no ring assembly below)
    const nw=hw*1.9, nh=hw*2.3;
    ink(g,1.4); g.fillStyle="#ffffff";
    g.beginPath(); g.rect(x-nw, y2, nw*2, nh); g.fill(); g.stroke();
    L(g, x-nw, y2+nh/2, x+nw, y2+nh/2);
  }
}

/* ---------- Ring hanger (real TOLCO Fig. 200 traced geometry) + pipe ---------- */
// Bore center maps to (cx,cy); inches->px via PX_PER_IN; DXF y-up flipped to
// canvas y-down. Lines drawn directly, arcs sampled as polylines (robust to flip).
function drawRealRing(g, cx, cy, rd){
  const sc = E();
  const TX = (x)=> cx + x*sc, TY = (y)=> cy - y*sc;
  ink(g, 1.8);
  g.beginPath();
  for(const ln of rd.lines){ g.moveTo(TX(ln[0]),TY(ln[1])); g.lineTo(TX(ln[2]),TY(ln[3])); }
  g.stroke();
  g.beginPath();
  for(const ar of rd.arcs){
    let acx=ar[0], acy=ar[1], r=ar[2], s=ar[3], e=ar[4];
    if(e<=s) e+=360;
    const sweep=e-s, n=Math.max(8, Math.round(sweep/4));
    for(let k=0;k<=n;k++){
      const t=(s+sweep*k/n)*Math.PI/180;
      const px=TX(acx + r*Math.cos(t)), py=TY(acy + r*Math.sin(t));
      if(k===0) g.moveTo(px,py); else g.lineTo(px,py);
    }
  }
  g.stroke();
}

// Pipe cut in section: outer wall (OD) + inner wall (ID) with the cut wall
// hatched; the bore stays clear.
function drawPipeSection(g, cx, cy, rOD){
  const wall = Math.max(3.5, Math.min(9, rOD*0.16));
  const rID = Math.max(2, rOD - wall);
  // clean white base under the pipe
  g.fillStyle="#ffffff"; g.beginPath(); g.arc(cx, cy, rOD, 0, 7); g.fill();
  // hatch the wall (annulus between OD and ID)
  g.save();
  g.beginPath();
  g.arc(cx, cy, rOD, 0, Math.PI*2);
  g.moveTo(cx+rID, cy);
  g.arc(cx, cy, rID, 0, Math.PI*2);
  g.clip('evenodd');
  ink(g,0.6);
  const y0=cy-rOD, y1=cy+rOD, x0=cx-rOD, x1=cx+rOD, span=(y1-y0);
  for(let xx=x0-span; xx<x1; xx+=5){ L(g, xx, y1, xx+span, y0); }
  g.restore();
  // wall outlines
  ink(g,2.4); g.beginPath(); g.arc(cx, cy, rOD, 0, 7); g.stroke();
  ink(g,1.6); g.beginPath(); g.arc(cx, cy, rID, 0, 7); g.stroke();
}

function drawRingAndPipe(g){
  const G = geom(); if(!G) return;
  const cx = state.pipe.x, cy = state.pipe.y, rP = G.pipeR;
  if(state.ring && G.rd){
    drawRealRing(g, cx, cy, G.rd);   // real TOLCO ring wraps the bore
  }
  drawPipeSection(g, cx, cy, rP);     // pipe section sits inside the bore
}

// Surge restraint: a plain rectangle from the underside of the ring's top socket
// down to the top of the pipe (alternative to extending the rod — XOR with rodToPipe).
function drawSurge(g){
  if(!state.surge || !state.ring || !state.pipe || !geom()) return;
  const G = geom(); if(!G.rd) return;
  const x = state.pipe.x, cy = state.pipe.y;
  // underside of the ring's top socket bar (where the loop arms begin) — NOT the nut at the very top
  let usY = G.rd.topY;
  for(const L of G.rd.lines){
    if(Math.max(Math.abs(L[0]),Math.abs(L[2]))<0.46 && Math.min(L[1],L[3])>G.rd.boreR) usY=Math.min(usY, L[1], L[3]);
  }
  const yTop = cy - usY*E();          // underside of the ring top part
  const yBot = cy - G.pipeR;          // top of the pipe
  if(yBot <= yTop) return;
  const sw = Math.max(rodHwPx()*2.2, 0.32*E());   // half-width of the restraint
  ink(g,1.6); g.fillStyle="#ffffff";
  g.beginPath(); g.rect(x-sw, yTop, sw*2, yBot-yTop); g.fill(); g.stroke();
}

/* ---------- Keynotes + leaders + legend ---------- */
function activeKeynotes(){
  const list=[];
  if(state.structure && STRUCTURES[state.structure].keynote) list.push({n:0,t:STRUCTURES[state.structure].keynote, at:'deck'});
  if(state.fastener) list.push({n:0,t:fastenerNote(), at:'fastener'});
  if(state.fastener) list.push({n:0,t:`${rodSize()}Ø ALL-THREAD HANGER ROD`, at:'rod'});
  if(state.ring) list.push({n:0,t:'ADJUSTABLE SWIVEL RING HANGER, UL LISTED', at:'ring'});
  if(state.pipe){
    const nps = PIPES[state.pipe.npsIndex].nps;
    list.push({n:0,t:`${nps} SPRINKLER PIPE`, at:'pipe'});
  }
  for(const c of state.customKeynotes) list.push({n:0, t:c.t, at:c.at});   // user-added keynotes
  list.forEach((k,i)=>{ k.n=i+1; if(state.keynoteText[k.at]) k.t=state.keynoteText[k.at]; });
  return list;
}

function fastenerNote(){
  const rs=rodSize();
  switch(state.fastener){
    case 'dropin':        return `${rs}Ø HILTI HDI DROP-IN ANCHOR, ICC-ES ESR-3779, EMBED PER MFR`;
    case 'wedge':         return `${rs}Ø WEDGE ANCHOR x 3-1/4" MIN. EMBED, ICC-ES LISTED`;
    case 'kwikbolt':      return `${rs}Ø HILTI KWIK BOLT TZ2 + COUPLING NUT FOR ${rs}Ø ROD, ICC-ES ESR-4266`;
    case 'castin':        return `${rs}Ø CAST-IN CONCRETE INSERT (BY OTHERS), MALLEABLE IRON`;
    case 'concretesammy': return `SAMMY CST CONCRETE SCREW ANCHOR FOR ${rs}Ø ROD, ICC-ES LISTED`;
    case 'woodvertical':  return `SAMMY GST VERTICAL WOOD SCREW FOR ${rs}Ø ROD, INTO 2x WOOD MEMBER`;
    case 'woodside':      return `SAMMY SWG SIDE-MOUNT WOOD SCREW FOR ${rs}Ø ROD, INTO 2x WOOD MEMBER`;
  }
  return FASTENERS[state.fastener].note || FASTENERS[state.fastener].name.toUpperCase();
}

function keynoteAnchor(at){
  const G = geom();
  const x = state.pipe ? state.pipe.x : AXIS;
  switch(at){
    case 'deck': return {x:x+40, y:DECK_TOP+(deckBot()-DECK_TOP)/2};
    case 'fastener': return {x:x+11, y:DECK_TOP+(deckBot()-DECK_TOP)/2};
    case 'rod': return G ? {x:x, y:(G.nutY+G.bossTop)/2} : {x,y:400};
    case 'ring': return G ? {x:x-G.ringR, y:state.pipe.y-G.ringR*0.5} : {x,y:600};
    case 'pipe': return G ? {x:x+G.pipeR, y:state.pipe.y} : {x,y:640};
  }
  if(at && at.indexOf('custom')===0){   // user-added keynote: start mid-sheet, fanned, then drag
    const i = state.customKeynotes.findIndex(c=>c.at===at);
    return {x:x+30, y:380 + (i<0?0:i)*26};
  }
  return {x,y:400};
}

function drawKeynotes(g){
  const keys = activeKeynotes();
  keynoteHit = []; leaderHit = [];
  if(!keys.length) return;
  const gutterX = W-150, R = 13;
  g.font="bold 19px Arial";
  keys.forEach((k,i)=>{
    const o = state.knOpt[k.at] || {};                 // per-keynote overrides (leader menu)
    const showLeader = o.leader!==false;               // default: leader shown
    const showHead   = o.head!==false;                 // default: arrowhead shown
    const shape      = o.shape || state.keynoteShape || 'bubble';
    const locked     = o.lock===true;                  // opt-in: arrow tip locked to its element (default off = draggable)
    const a = locked ? keynoteSafe(k.at) : (state.keynoteArrow[k.at] || keynoteSafe(k.at)); // live anchor when locked
    const def = {x:gutterX, y:250 + i*46};             // default gutter slot
    const pos = state.keynotePos[k.at] || def;
    const bx = pos.x, byy = pos.y;
    // leader from bubble edge to the arrow tip (optional)
    const dx=a.x-bx, dy=a.y-byy, dl=Math.hypot(dx,dy)||1;
    const sx=bx+dx/dl*R, sy=byy+dy/dl*R;
    if(showLeader){
      ink(g,1.0); g.beginPath(); g.moveTo(sx,sy); g.lineTo(a.x,a.y); g.stroke();
      if(showHead) arrow(g, sx, sy, a.x, a.y);          // arrowhead at the tip
      leaderHit.push({at:k.at, x1:sx, y1:sy, x2:a.x, y2:a.y});
      keynoteHit.push({kind:'arrow', at:k.at, x:a.x, y:a.y, r:9}); // always grabbable (grabbing a locked tip frees it)
    }
    // bubble / tag (shape: bubble | square | rectangle | plain)
    g.fillStyle="#ffffff";
    if(shape==='bubble'){
      ink(g,1.8); g.beginPath(); g.arc(bx, byy, R, 0, 7); g.fill(); g.stroke();
    } else if(shape==='square'){
      const s=R*1.65; ink(g,1.8); g.beginPath(); g.rect(bx-s, byy-s, s*2, s*2); g.fill(); g.stroke();
    } else if(shape==='rectangle'){
      const hwR=R*1.6, hhR=R*1.05; ink(g,1.8); g.beginPath(); g.rect(bx-hwR, byy-hhR, hwR*2, hhR*2); g.fill(); g.stroke();
    } // 'plain' = no outline/fill, just the number on the white sheet
    g.fillStyle="#111418"; g.textAlign="center"; g.textBaseline="middle";
    g.fillText(String(k.n), bx, byy+1);
    g.textBaseline="alphabetic";
    keynoteHit.push({kind:'bubble', at:k.at, x:bx, y:byy, r:R});
  });
}
// guard against undefined geom for anchors
function keynoteSafe(at){ try{ return keynoteAnchor(at);}catch(e){ return {x:AXIS,y:400}; } }
// arrow tip locked to its element (default): follows the element/pipe live. Unlock to free-drag.
function arrowLocked(at){ const o=state.knOpt[at]; return !!(o && o.lock===true); }
function keynoteArrowPos(at){ return arrowLocked(at) ? keynoteSafe(at) : (state.keynoteArrow[at] || keynoteSafe(at)); }
function keynoteBubblePos(at){
  if(state.keynotePos[at]) return state.keynotePos[at];
  const i=activeKeynotes().findIndex(k=>k.at===at);
  return {x:W-150, y:250+(i<0?0:i)*46};
}
// shortest distance from point (px,py) to segment (x1,y1)-(x2,y2)
function distToSeg(px,py, x1,y1, x2,y2){
  const vx=x2-x1, vy=y2-y1, L=vx*vx+vy*vy;
  let t = L ? ((px-x1)*vx+(py-y1)*vy)/L : 0;
  t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(x1+vx*t), py-(y1+vy*t));
}

// Re-anchor: point each keynote's arrow at its element and park the bubble just
// outside that element (fanned away from the drawing center) — keeps notes tied
// to what they label instead of dumping them in the gutter.
function reanchorKeynotes(){
  const keys=activeKeynotes(); const cx=W/2, cy=H*0.45;
  keys.forEach(k=>{
    const a=keynoteSafe(k.at);
    state.keynoteArrow[k.at]={x:a.x, y:a.y};
    let vx=a.x-cx, vy=a.y-cy, vl=Math.hypot(vx,vy)||1;
    state.keynotePos[k.at]={ x:clamp(a.x+vx/vl*58, 40, W-40), y:clamp(a.y+vy/vl*58, 40, TITLE_TOP-12) };
  });
  draw(); commit(); flash("Keynotes re-anchored to their elements.");
}
// Auto-align: stack the bubbles in a single vertical column (aligned on Y),
// evenly spaced; arrows keep pointing at their elements.
function alignKeynotes(){
  const keys=activeKeynotes(); const colX=W-150, y0=240, dy=46;
  keys.forEach((k,i)=>{ state.keynotePos[k.at]={x:colX, y:y0+i*dy}; });
  draw(); commit(); flash("Keynotes aligned in a column.");
}

function arrow(g, x1,y1,x2,y2){
  const ang=Math.atan2(y2-y1,x2-x1), s=7;
  ink(g,1.0); g.fillStyle="#111418";
  g.beginPath();
  g.moveTo(x2,y2);
  g.lineTo(x2-s*Math.cos(ang-0.4), y2-s*Math.sin(ang-0.4));
  g.lineTo(x2-s*Math.cos(ang+0.4), y2-s*Math.sin(ang+0.4));
  g.closePath(); g.fill();
}

/* ---------- Title block + keynote legend ---------- */
function drawTitleBlock(g){
  ink(g,2.0);
  L(g, 28, TITLE_TOP, W-28, TITLE_TOP);
  // Keynote legend (left)
  const keys = activeKeynotes();
  g.textAlign="left"; g.fillStyle="#111418";
  g.font="bold 14px Arial";
  g.fillText("KEYNOTES", 44, TITLE_TOP+20);
  legendHit = [];
  const legendW = (W-300) - 64 - 8, LH = 12.5;   // wrap width + line height
  let ly = TITLE_TOP+42;
  for(const k of keys){
    g.font="11px Arial";
    const lines = wrapLines(g, k.t, legendW);
    const rowTop = ly-12, rowBot = ly + (lines.length-1)*LH + 5;
    // small tag, vertically centered on the row — shape matches the keynote bubble
    const by = (rowTop+rowBot)/2;
    const o = state.knOpt[k.at] || {};
    const shape = o.shape || state.keynoteShape || 'bubble';
    const r = 8;
    ink(g,1.3); g.fillStyle="#ffffff";
    if(shape==='square'){ g.beginPath(); g.rect(50-r, by-r, r*2, r*2); g.fill(); g.stroke(); }
    else if(shape==='rectangle'){ const hw=r*1.45, hh=r*0.82; g.beginPath(); g.rect(50-hw, by-hh, hw*2, hh*2); g.fill(); g.stroke(); }
    else if(shape==='bubble'){ g.beginPath(); g.arc(50, by, r, 0, 7); g.fill(); g.stroke(); }
    // 'plain' = no outline, just the number
    g.fillStyle="#111418"; g.textAlign="center"; g.font="bold 11px Arial";
    g.fillText(String(k.n), 50, by+4);
    // wrapped text
    g.textAlign="left"; g.font="11px Arial";
    for(let i=0;i<lines.length;i++) g.fillText(lines[i], 64, ly + i*LH);
    legendHit.push({at:k.at, x0:40, y0:rowTop, x1:W-300, y1:rowBot});
    ly = rowBot + 14;   // extra padding so tags don't clip into the next row
  }
  // Title (right block)
  const tbx = W-300;
  ink(g,1.4); L(g, tbx, TITLE_TOP, tbx, H-28);
  g.textAlign="left"; g.fillStyle="#111418";
  g.font="bold 17px Arial";
  wrapText(g, state.title, tbx+16, TITLE_TOP+30, 250, 20);
  g.font="11px Arial"; g.fillStyle="#444";
  g.fillText("SCALE: NTS", tbx+16, H-58);
  g.font="bold 12px Arial"; g.fillStyle="#111418";
  g.fillText("DETAIL  "+state.detailNo, tbx+16, H-40);
  // small detail tag bubble
  ink(g,1.8); g.fillStyle="#ffffff";
  g.beginPath(); g.arc(W-52, H-50, 16, 0, 7); g.fill(); g.stroke();
  g.fillStyle="#111418"; g.textAlign="center"; g.font="bold 15px Arial";
  g.fillText(state.detailNo, W-52, H-45);
  g.textAlign="left";
}

function wrapText(g, text, x, y, maxW, lh){
  const words=text.split(/\s+/); let line=""; let yy=y;
  for(const w of words){
    const test=line?line+" "+w:w;
    if(g.measureText(test).width>maxW && line){ g.fillText(line,x,yy); line=w; yy+=lh; }
    else line=test;
  }
  if(line) g.fillText(line,x,yy);
}
// split text into lines that each fit within maxW (uses the current g.font)
function wrapLines(g, text, maxW){
  const words=String(text).split(/\s+/), lines=[]; let line="";
  for(const w of words){
    const test=line?line+" "+w:w;
    if(g.measureText(test).width>maxW && line){ lines.push(line); line=w; }
    else line=test;
  }
  if(line) lines.push(line);
  return lines.length?lines:[""];
}

/* ---------- On-screen-only ghosts to guide placement ---------- */
function drawGhostHelpers(g){
  if(!state.pipe){
    g.save();
    g.strokeStyle="rgba(120,170,255,.55)"; g.setLineDash([6,6]); g.lineWidth=1.4;
    g.beginPath(); g.arc(AXIS, 560, 34, 0, 7); g.stroke();
    g.setLineDash([]);
    g.fillStyle="rgba(150,180,220,.85)"; g.font="13px Arial"; g.textAlign="center";
    g.fillText("pipe goes here", AXIS, 612);
    g.textAlign="left"; g.restore();
  }
}

/* ============================================================
   draw() — screen render through the fit transform
   ============================================================ */
function draw(){
  ctx.save();
  ctx.setTransform(view.dpr,0,0,view.dpr,0,0);
  ctx.clearRect(0,0,cv.width,cv.height);
  // paper sheet
  ctx.translate(view.ox, view.oy); ctx.scale(view.scale, view.scale);
  // drop shadow + white sheet
  ctx.save();
  ctx.shadowColor="rgba(0,0,0,.45)"; ctx.shadowBlur=18; ctx.shadowOffsetY=6;
  ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,W,H);
  ctx.restore();
  render(ctx, {paper:false});
  ctx.restore();
  if(loupe) drawLoupe(loupe.x, loupe.y);
}

// Magnifier loupe (double-tap to summon): a circular 2.3x zoom of the area under
// the finger, drawn offset so the finger doesn't cover it — makes tiny targets
// like keynote arrow tips easy to grab. Auto-dismisses after a drag.
let loupe = null;          // {x,y} in canvas CSS px (the focus point = finger)
function drawLoupe(fx, fy){
  const dpr=view.dpr, r=Math.min(62, cv.width/dpr*0.22), zoom=2.3;
  const cssW=cv.width/dpr, cssH=cv.height/dpr;
  let lx=fx, ly=fy-r-52;                 // float above the finger
  if(ly-r<6) ly=fy+r+52;                 // flip below if no room
  lx=clamp(lx, r+6, cssW-r-6); ly=clamp(ly, r+6, cssH-r-6);
  ctx.save();
  ctx.setTransform(dpr,0,0,dpr,0,0);     // work in CSS px
  ctx.beginPath(); ctx.arc(lx,ly,r,0,7);
  ctx.fillStyle="#ffffff"; ctx.fill();
  ctx.save(); ctx.clip();
  const srcR=r/zoom;                      // source half-size in CSS px
  ctx.drawImage(cv, (fx-srcR)*dpr, (fy-srcR)*dpr, 2*srcR*dpr, 2*srcR*dpr, lx-r, ly-r, 2*r, 2*r);
  ctx.restore();
  ctx.lineWidth=2.5; ctx.strokeStyle="#ffb03a"; ctx.beginPath(); ctx.arc(lx,ly,r,0,7); ctx.stroke();
  ctx.strokeStyle="rgba(255,176,58,.75)"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(lx-9,ly); ctx.lineTo(lx+9,ly); ctx.moveTo(lx,ly-9); ctx.lineTo(lx,ly+9); ctx.stroke();
  ctx.restore();
}

/* ============================================================
   Interaction
   ============================================================ */
let drag=null;
const pointers=new Map();   // pointerId -> {x,y} in canvas CSS px (for pinch)
let pinch=null;
cv.addEventListener('pointerdown', onDown);
cv.addEventListener('pointermove', onMove);
cv.addEventListener('pointerup', onUp);
cv.addEventListener('pointercancel', onUp);
cv.addEventListener('wheel', e=>{
  e.preventDefault();
  setDetailScale(state.detailScale * Math.exp(-e.deltaY*0.0015));
  commitSoon();
}, {passive:false});

function canvasPt(e){ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
function startPinch(){
  drag=null;
  const p=[...pointers.values()];
  pinch={ d0:Math.hypot(p[0].x-p[1].x, p[0].y-p[1].y) || 1, ds0:state.detailScale };
}

function onDown(e){
  cv.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, canvasPt(e));
  if(pointers.size===2){ startPinch(); return; }   // two fingers => pinch zoom/pan
  if(pointers.size>2) return;

  // double-tap toggles the magnifier loupe; a normal press while it's on follows + grabs
  const cp=canvasPt(e), now=e.timeStamp||performance.now();
  const dbl = lastTap && (now-lastTap.t)<320 && Math.hypot(cp.x-lastTap.x, cp.y-lastTap.y)<30;
  lastTap = dbl ? null : {t:now, x:cp.x, y:cp.y};
  if(dbl){
    const dd = toDetail(e.clientX, e.clientY);
    // double-tap a leader (or its bubble, for when the leader is hidden) => leader/bubble options menu
    for(const lh of leaderHit){ if(distToSeg(dd.x,dd.y, lh.x1,lh.y1, lh.x2,lh.y2) < 16){ openLeaderMenu(lh.at); return; } }
    for(const kb of keynoteHit){ if(kb.kind==='bubble' && Math.hypot(dd.x-kb.x, dd.y-kb.y) < kb.r+10){ openLeaderMenu(kb.at); return; } }
    loupe = loupe ? null : {x:cp.x, y:cp.y}; draw(); return;
  }
  if(loupe){ loupe.x=cp.x; loupe.y=cp.y; }

  const d = toDetail(e.clientX, e.clientY);
  // place pipe
  if(activeTool==='pipe'){
    const idx = state.pipe ? state.pipe.npsIndex : pendingNps;
    const [yMin,yMax] = pipeYRange(idx);
    const y = clamp(d.y, yMin, yMax);
    const x = clamp(d.x, 90, W-200);
    if(!state.pipe) state.pipe={x, y, npsIndex:pendingNps};
    else { state.pipe.x=x; state.pipe.y=y; }
    setTool(null); updateUI(); draw(); flash("Pipe placed. Add a Ring, Structure, then Fastener.");
    return;
  }
  // tap a keynote legend row to edit its text
  for(const lh of legendHit){
    if(d.x>=lh.x0 && d.x<=lh.x1 && d.y>=lh.y0 && d.y<=lh.y1){ openKeynoteEdit(lh.at); return; }
  }
  // drag a keynote bubble or its arrow tip (both movable; leader connects them)
  for(const kb of keynoteHit){
    const pad = kb.kind==='arrow' ? 6 : 10;
    if(Math.hypot(d.x-kb.x, d.y-kb.y) < kb.r+pad){
      if(kb.kind==='arrow' && arrowLocked(kb.at)){   // grabbing a locked tip frees it so it can be moved
        state.keynoteArrow[kb.at]={...keynoteSafe(kb.at)};
        state.knOpt[kb.at]=Object.assign({}, state.knOpt[kb.at], {lock:false});
      }
      drag={type:'keynote', kind:kb.kind, at:kb.at, dx:d.x-kb.x, dy:d.y-kb.y};
      return;
    }
  }
  // grab the MIDDLE of a leader line => move the whole keynote (bubble + arrow together)
  for(const lh of leaderHit){
    if(distToSeg(d.x,d.y, lh.x1,lh.y1, lh.x2,lh.y2) < 12){
      drag={type:'keynote', kind:'leader', at:lh.at, gx:d.x, gy:d.y,
            b0:{...keynoteBubblePos(lh.at)}, a0:{...keynoteArrowPos(lh.at)}, lockedArrow:arrowLocked(lh.at)};
      return;
    }
  }
  // otherwise: drag existing pipe assembly
  if(state.pipe && !state.pipeLocked){
    const G=geom();
    const dx=d.x-state.pipe.x, dy=d.y-state.pipe.y;
    if(Math.hypot(dx,dy) < (G?G.ringR:30)+18){ drag={type:'pipe',dx,dy}; }
  }
}
function onMove(e){
  if(pointers.has(e.pointerId)) pointers.set(e.pointerId, canvasPt(e));
  if(loupe && pointers.size===1){ const cp=canvasPt(e); loupe.x=cp.x; loupe.y=cp.y; if(!drag) draw(); }
  // pinch => scale the detail drawing (two pointers)
  if(pointers.size>=2 && pinch){
    const p=[...pointers.values()];
    const d=Math.hypot(p[0].x-p[1].x, p[0].y-p[1].y) || 1;
    setDetailScale(pinch.ds0 * (d/pinch.d0));
    return;
  }
  if(!drag) return;
  const d=toDetail(e.clientX,e.clientY);
  if(drag.type==='keynote' && drag.kind==='leader'){
    // translate the keynote; clamp the shared delta so both ends stay in bounds.
    // a locked arrow stays pinned to its element, so only the bubble moves.
    let mdx=d.x-drag.gx, mdy=d.y-drag.gy;
    if(drag.lockedArrow){
      mdx=clamp(mdx, 40-drag.b0.x, (W-40)-drag.b0.x);
      mdy=clamp(mdy, 40-drag.b0.y, (TITLE_TOP-12)-drag.b0.y);
      state.keynotePos[drag.at]={x:drag.b0.x+mdx, y:drag.b0.y+mdy};
    } else {
      mdx=clamp(mdx, Math.max(40-drag.b0.x, 32-drag.a0.x), Math.min((W-40)-drag.b0.x, (W-32)-drag.a0.x));
      mdy=clamp(mdy, Math.max(40-drag.b0.y, 32-drag.a0.y), Math.min((TITLE_TOP-12)-drag.b0.y, (H-32)-drag.a0.y));
      state.keynotePos[drag.at]={x:drag.b0.x+mdx, y:drag.b0.y+mdy};
      state.keynoteArrow[drag.at]={x:drag.a0.x+mdx, y:drag.a0.y+mdy};
    }
    draw(); return;
  }
  if(drag.type==='keynote'){
    let nx=d.x-drag.dx, ny=d.y-drag.dy;
    if(state.ortho){   // snap the leader to 45° increments off the fixed end
      const a = drag.kind==='arrow' ? keynoteBubblePos(drag.at) : keynoteArrowPos(drag.at);
      let ang=Math.round(Math.atan2(ny-a.y, nx-a.x)/(Math.PI/4))*(Math.PI/4);
      const dist=Math.hypot(nx-a.x, ny-a.y);
      nx=a.x+Math.cos(ang)*dist; ny=a.y+Math.sin(ang)*dist;
    }
    if(drag.kind==='arrow')
      state.keynoteArrow[drag.at]={x:clamp(nx,32,W-32), y:clamp(ny,32,H-32)};
    else
      state.keynotePos[drag.at]={x:clamp(nx,40,W-40), y:clamp(ny,40,TITLE_TOP-12)};
    draw(); return;
  }
  if(!state.pipe) return;
  const [yMin,yMax] = pipeYRange(state.pipe.npsIndex);
  state.pipe.x=clamp(d.x-drag.dx, 90, W-200);
  state.pipe.y=clamp(d.y-drag.dy, yMin, yMax);
  draw();
}
let lastTap=null;
function onUp(e){
  pointers.delete(e.pointerId);
  if(pointers.size<2) pinch=null;
  if(pointers.size===0){
    const wasDrag=!!drag; drag=null;
    if(loupe && wasDrag){ loupe=null; draw(); }   // loupe auto-dismisses after a grab/drag
    commit();   // record the end of any gesture (pipe place/move, keynote move, pinch zoom)
  }
}

function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

// valid vertical range for the pipe center so the full hanger fits below the deck
function pipeYRange(npsIndex){
  const rP = PIPES[npsIndex].od*E()/2;
  const rd = ringData(npsIndex);
  const top = rd ? rd.topY*E() : (rP + 30);
  return [deckBot() + 45 + top, TITLE_TOP - rP - 14];
}

const tools = document.getElementById('tools');
tools.addEventListener('click', e=>{
  const b=e.target.closest('.tool'); if(!b) return;
  if(b.getAttribute('aria-disabled')==='true') return;
  const t=b.dataset.tool;
  if(t==='pipe'){ openPipe(); }

function setTool(t){
  activeTool=t;
  [...document.querySelectorAll('.tool')].forEach(el=>el.classList.toggle('active', el.dataset.tool===t));
  if(t==='pipe') flash("Tap the canvas to place the pipe.");

/* ---- sheets ---- */
const sheetBack=document.getElementById('sheetBack');
const sheet=document.getElementById('sheet');
let pendingSheetSave=null;   // called when a sheet is dismissed by tapping the backdrop
function showSheet(html){ pendingSheetSave=null; sheet.innerHTML=html; sheetBack.classList.add('show'); }
function hideSheet(){ sheetBack.classList.remove('show'); pendingSheetSave=null; }
sheetBack.addEventListener('click', e=>{ if(e.target===sheetBack){ if(pendingSheetSave) pendingSheetSave(); hideSheet(); } });
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Tap a keynote legend row to edit its text. OK or tap outside confirms.
function isCustomKeynote(at){ return typeof at==='string' && at.indexOf('custom')===0; }
// Add a blank user keynote (auto-numbered next) and open its editor.
function addKeynote(){
  state.customSeq = (state.customSeq||0) + 1;
  const at = 'custom'+state.customSeq;
  state.customKeynotes.push({at, t:'NEW KEYNOTE'});
  state.keynoteText[at] = 'NEW KEYNOTE';
  updateUI(); draw(); commit();
  openKeynoteEdit(at);
}
function deleteCustomKeynote(at){
  state.customKeynotes = state.customKeynotes.filter(c=>c.at!==at);
  delete state.keynoteText[at]; delete state.knOpt[at]; delete state.keynotePos[at]; delete state.keynoteArrow[at];
  updateUI(); draw(); commit();
}
function openKeynoteEdit(at){
  const k=activeKeynotes().find(x=>x.at===at); if(!k) return;
  const custom=isCustomKeynote(at);
  showSheet(`
    <h3>Edit Keynote ${k.n}</h3>
    <div class="field"><textarea id="kIn" rows="3" style="width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;resize:vertical;">${escapeHtml(k.t)}</textarea></div>
    <div class="row"><button class="ghost" data-act="revert">${custom?'Delete keynote':'Revert to default'}</button>
    <button class="opt" style="justify-content:center;margin:0;" data-act="ok">OK</button></div>
  `);
  const inp=document.getElementById('kIn');
  const save=()=>{ const v=inp.value.replace(/\s+/g,' ').trim(); if(v) state.keynoteText[at]=v.toUpperCase(); else delete state.keynoteText[at]; draw(); commit(); };
  pendingSheetSave=save;   // tapping outside the sheet confirms the edit
  sheet.querySelector('[data-act="ok"]').onclick=()=>{ save(); hideSheet(); };
  sheet.querySelector('[data-act="revert"]').onclick=()=>{
    pendingSheetSave=null;
    if(custom) deleteCustomKeynote(at);
    else { delete state.keynoteText[at]; draw(); commit(); }
    hideSheet();
  };
  inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length);
}

// Double-tap a leader => per-keynote options: leader line on/off, bubble shape, arrowhead on/off.
function openLeaderMenu(at){
  const k=activeKeynotes().find(x=>x.at===at); if(!k) return;
  const o=state.knOpt[at]||{};
  const leaderOn=o.leader!==false, headOn=o.head!==false, lockOn=o.lock===true, shape=o.shape||state.keynoteShape||'bubble';
  const sel=c=>c?'sel':'';
  showSheet(`
    <h3>Keynote ${k.n} <span class="sub">bubble &amp; leader</span></h3>
    <div class="fieldlbl">Leader line</div>
    <div class="iconrow">
      <button class="miniopt ${sel(leaderOn)}" data-leader="1" title="Show leader">↘</button>
      <button class="miniopt ${sel(!leaderOn)}" data-leader="0" title="Bubble only (no leader)">○</button>
    </div>
    <div class="fieldlbl">Bubble shape</div>
    <div class="iconrow">
      <button class="miniopt ${sel(shape==='bubble')}" data-shape="bubble" title="Circle">●</button>
      <button class="miniopt ${sel(shape==='square')}" data-shape="square" title="Square">■</button>
      <button class="miniopt ${sel(shape==='rectangle')}" data-shape="rectangle" title="Rectangle">▬</button>
      <button class="miniopt ${sel(shape==='plain')}" data-shape="plain" title="No bubble">∅</button>
    </div>
    <div class="fieldlbl">Arrow head</div>
    <div class="iconrow">
      <button class="miniopt ${sel(headOn)}" data-head="1" title="Keep arrow head">➤</button>
      <button class="miniopt ${sel(!headOn)}" data-head="0" title="No arrow head">─</button>
    </div>
    <div class="fieldlbl">Arrow tip</div>
    <div class="iconrow">
      <button class="miniopt ${sel(lockOn)}" data-lock="1" title="Locked to element (follows the pipe)">🔒</button>
      <button class="miniopt ${sel(!lockOn)}" data-lock="0" title="Free — drag the tip anywhere">✛</button>
    </div>
    <div class="row"><button class="ghost" data-act="close">Done</button></div>
  `);
  const setOpt=(patch,grp)=>{
    state.knOpt[at]=Object.assign({}, state.knOpt[at], patch);
    sheet.querySelectorAll(`[data-${grp}]`).forEach(x=>x.classList.remove('sel'));
    draw(); commit();
  };
  sheet.querySelectorAll('[data-leader]').forEach(b=> b.onclick=()=>{ setOpt({leader:b.dataset.leader==='1'},'leader'); b.classList.add('sel'); });
  sheet.querySelectorAll('[data-shape]').forEach(b=> b.onclick=()=>{ setOpt({shape:b.dataset.shape},'shape'); b.classList.add('sel'); });
  sheet.querySelectorAll('[data-head]').forEach(b=> b.onclick=()=>{ setOpt({head:b.dataset.head==='1'},'head'); b.classList.add('sel'); });
  sheet.querySelectorAll('[data-lock]').forEach(b=> b.onclick=()=>{
    const lock=b.dataset.lock==='1';
    if(lock) delete state.keynoteArrow[at];                       // re-pin to the live element anchor
    else state.keynoteArrow[at]={...keynoteSafe(at)};             // freeze current spot, then free-drag
    setOpt({lock}, 'lock'); b.classList.add('sel');
  });
  sheet.querySelector('[data-act="close"]').onclick=hideSheet;
}

function openRing(){
  if(!state.pipe){ flash("Place a pipe first, then add the ring."); return; }
  showSheet(`
    <h3>Ring Hanger <span class="sub">tap to place around pipe</span></h3>
    <button class="opt ${state.ring?'sel':''}" data-act="ring-swivel">
      <span class="gico">◎</span>
      <span>Adjustable Swivel Ring<small>TOLCO Fig. 200 — wraps the pipe, threaded socket takes the rod</small></span>
    </button>
    <button class="opt ${state.rodToPipe?'sel':''}" data-act="rod-extend">
      <span class="gico">${state.rodToPipe?'☑':'☐'}</span>
      <span>Extend rod to top of pipe<small>Rod continues past the ring socket down to the top of the pipe</small></span>
    </button>
    <button class="opt ${state.surge?'sel':''}" data-act="surge">
      <span class="gico">${state.surge?'☑':'☐'}</span>
      <span>Surge restraint<small>Rectangle from the ring top down to the pipe (instead of extending the rod)</small></span>
    </button>
    <div class="row"><button class="ghost" data-act="close">Done</button></div>
  `);
  sheet.querySelector('[data-act="ring-swivel"]').onclick=()=>{ state.ring=true; updateUI(); draw(); commit(); openRing(); flash("Ring added."); };
  sheet.querySelector('[data-act="rod-extend"]').onclick=()=>{ state.rodToPipe=!state.rodToPipe; if(state.rodToPipe) state.surge=false; draw(); commit(); openRing(); };
  sheet.querySelector('[data-act="surge"]').onclick=()=>{ state.surge=!state.surge; if(state.surge) state.rodToPipe=false; draw(); commit(); openRing(); };
  sheet.querySelector('[data-act="close"]').onclick=hideSheet;
}

function openStructure(){
  const items=Object.entries(STRUCTURES).map(([k,s])=>`
    <button class="opt ${state.structure===k?'sel':''}" ${s.on?'':'disabled'} data-k="${k}">
      <span class="gico">${s.ico}</span>
      <span>${s.name}${s.on?'':' <small>coming soon</small>'}</span>
    </button>`).join('');
  showSheet(`<h3>Structure <span class="sub">what you're hanging from</span></h3>${items}
    <div class="row"><button class="ghost" data-act="close">Cancel</button></div>`);
  sheet.querySelectorAll('.opt[data-k]').forEach(b=> b.onclick=()=>{
    const k=b.dataset.k; if(!STRUCTURES[k].on) return;
    state.structure=k;
    // reset fastener if not valid for this structure
    if(state.fastener && !STRUCTURES[k].fasteners.includes(state.fastener)) state.fastener=null;
    hideSheet(); updateUI(); draw(); commit(); flash("Structure set. Now choose a Fastener.");
  });
  sheet.querySelector('[data-act="close"]').onclick=hideSheet;
}

function openFastener(){
  if(!state.structure){ flash("Pick a Structure first — fasteners depend on it."); return; }
  const valid=STRUCTURES[state.structure].fasteners;
  const items=valid.map(k=>{
    const f=FASTENERS[k];
    const sammyBlocked = SAMMY_FASTENERS.includes(k) && !pipeAllowsSammy(); // SAMMY = 3/8" rod, 4" pipe max
    const on = !!f.on && !sammyBlocked;
    const note = !f.on ? ' <small>coming soon</small>' : (sammyBlocked ? ' <small>max 4" pipe</small>' : '');
    return `<button class="opt ${state.fastener===k?'sel':''}" ${on?'':'disabled'} data-k="${k}">
      <span class="gico">⚓</span>
      <span>${f.name}${note}</span></button>`;
  }).join('');
  // SWG side-mount has 3 screw sizes — show a chip row when it's the active fastener
  const swgSizes=[['10','SWG 10 · 1"'],['20','SWG 20 · 2"'],['25380','SWG 25-380 · 2½"']];
  const sizeRow = state.fastener==='woodside'
    ? `<div style="font-size:12px;color:var(--muted);margin:10px 2px 6px;">SideWinder screw size <span class="sub">all for 3/8" rod</span></div>
       <div class="chips" id="swgChips">${swgSizes.map(([k,lbl])=>`<button class="chip ${state.swgSize===k?'sel':''}" data-sz="${k}">${lbl}</button>`).join('')}</div>`
    : '';
  showSheet(`<h3>Fastener <span class="sub">for ${STRUCTURES[state.structure].name}</span></h3>${items}${sizeRow}
    <div class="row"><button class="ghost" data-act="close">${state.fastener==='woodside'?'Done':'Cancel'}</button></div>`);
  sheet.querySelectorAll('.opt[data-k]').forEach(b=> b.onclick=()=>{
    if(b.disabled) return;
    const k=b.dataset.k;
    state.fastener=k; updateUI(); draw(); commit();
    if(k==='woodside'){ openFastener(); return; }   // reveal the size chips, keep the sheet open
    hideSheet();
    flash("Fastener placed — rod auto-connected to the pipe. Tap ⤓ PNG to export.");
  });
  sheet.querySelectorAll('#swgChips .chip').forEach(c=> c.onclick=()=>{
    state.swgSize=c.dataset.sz;
    sheet.querySelectorAll('#swgChips .chip').forEach(x=>x.classList.toggle('sel', x===c));
    draw(); commit();
  });
  sheet.querySelector('[data-act="close"]').onclick=hideSheet;
}

/* pipe size: long-press pipe tool? simpler: tapping placed pipe opens size via Ring-less control.
   We add a size button in the Pipe sheet flow: tap Pipe tool when pipe exists -> size sheet */
function openPipe(){
  const cur = state.pipe ? state.pipe.npsIndex : pendingNps;
  const chips=PIPES.map((p,i)=>`<button class="chip ${cur===i?'sel':''}" data-i="${i}">${p.nps}</button>`).join('');
  showSheet(`
    <h3>Pipe Size</h3>
    <div class="chips">${chips}</div>
  `);
  // one tap on a size sets it and closes the menu
  sheet.querySelectorAll('.chip').forEach(c=> c.onclick=()=>{
    const i=+c.dataset.i;
    pendingNps=i;
    let dropped=false;
    if(state.pipe){
      state.pipe.npsIndex=i;
      const [yMin,yMax]=pipeYRange(i);
      state.pipe.y=clamp(state.pipe.y, yMin, yMax);
      // SAMMY hangers are 3/8"-rod only (4" pipe max) — drop if the new size is too big
      if(SAMMY_FASTENERS.includes(state.fastener) && !pipeAllowsSammy()){ state.fastener=null; dropped=true; }
    }
    hideSheet(); updateUI(); draw(); commit();
    if(dropped) flash('SAMMY hangers are for 4" pipe and smaller — fastener cleared. Pick another fastener.');
  });
}

  showSheet(`<h3>Detail Options</h3>
    <div class="field"><label>Title</label><input id="tIn" value="${escapeAttr(state.title)}"></div>
    <div class="field"><label>Detail number</label><input id="nIn" value="${escapeAttr(state.detailNo)}"></div>
    <div class="field"><label>Keynote style</label><div class="chips" id="shapeChips">${chips}</div></div>
    <button class="opt ${state.ortho?'sel':''}" data-act="ortho">
      <span class="gico">${state.ortho?'☑':'☐'}</span>
      <span>Ortho snap (45°)<small>Keynote leaders snap to 45° angles while dragging</small></span>
    </button>
    <button class="opt ${state.pipeLocked?'sel':''}" data-act="pipelock">
      <span class="gico">${state.pipeLocked?'🔒':'🔓'}</span>
      <span>Lock pipe in place<small>Prevents the pipe assembly from being dragged</small></span>
    </button>
    <button class="opt" style="justify-content:center;margin:0 0 8px;" data-act="addkn">➕ Add a keynote</button>
    <button class="opt" style="justify-content:center;margin:0 0 8px;" data-act="reanchor">↺ Re-anchor keynotes to elements</button>
    <button class="opt" style="justify-content:center;margin:0 0 8px;" data-act="align">▤ Auto-align keynotes (column)</button>
    <div style="color:var(--muted);font-size:12px;margin:0 0 10px;">Tip: double-tap a leader (or its bubble) for line / shape / arrow-head options. Double-tap empty space for a magnifier to grab arrow tips.</div>
    <div class="row"><button class="ghost" data-act="close">Cancel</button>
    <button class="opt" style="justify-content:center;margin:0;" data-act="save">Save</button></div>`);
  sheet.querySelectorAll('#shapeChips .chip').forEach(c=> c.onclick=()=>{
    state.keynoteShape=c.dataset.shape;
    sheet.querySelectorAll('#shapeChips .chip').forEach(x=>x.classList.toggle('sel', x===c));
    draw(); commit();
  });
  sheet.querySelector('[data-act="ortho"]').onclick=(ev)=>{
    state.ortho=!state.ortho; const b=ev.currentTarget;
    b.classList.toggle('sel', state.ortho); b.querySelector('.gico').textContent = state.ortho?'☑':'☐';
  };
  sheet.querySelector('[data-act="pipelock"]').onclick=(ev)=>{
    state.pipeLocked=!state.pipeLocked; const b=ev.currentTarget;
    b.classList.toggle('sel', state.pipeLocked); b.querySelector('.gico').textContent = state.pipeLocked?'🔒':'🔓';
    flash(state.pipeLocked ? "Pipe locked in place." : "Pipe unlocked.");
  };
  sheet.querySelector('[data-act="addkn"]').onclick=()=>{ addKeynote(); };   // opens the editor for the new keynote
  sheet.querySelector('[data-act="reanchor"]').onclick=()=>{ hideSheet(); reanchorKeynotes(); };
  sheet.querySelector('[data-act="align"]').onclick=()=>{ hideSheet(); alignKeynotes(); };
  sheet.querySelector('[data-act="save"]').onclick=()=>{
    state.title=(document.getElementById('tIn').value||state.title).toUpperCase();
    state.detailNo=document.getElementById('nIn').value||state.detailNo;
    hideSheet(); draw(); commit();
  };
  sheet.querySelector('[data-act="close"]').onclick=hideSheet;
};
function escapeAttr(s){ return String(s).replace(/"/g,'&quot;'); }

/* ============================================================
   Export DXF (full detail, R12 ASCII; hatches exploded to lines)
   A recording "context" mimics the canvas 2D API so the SAME draw
   code produces DXF entities. Hatch/grain lines are geometrically
   clipped to their region (rect or pipe annulus). Y is flipped.
   ============================================================ */
function dxfIsWhite(c){ c=(c||'').toLowerCase(); return c==='#fff'||c==='#ffffff'||c==='white'; }
// Liang-Barsky: clip segment to a rect -> [] or [[x1,y1,x2,y2]]
function dxfClipRect(x1,y1,x2,y2,r){
  let t0=0,t1=1; const dx=x2-x1,dy=y2-y1;
  const p=[-dx,dx,-dy,dy], q=[x1-r.x0, r.x1-x1, y1-r.y0, r.y1-y1];
  for(let i=0;i<4;i++){
    if(p[i]===0){ if(q[i]<0) return []; }
    else { const t=q[i]/p[i]; if(p[i]<0){ if(t>t1) return []; if(t>t0) t0=t; } else { if(t<t0) return []; if(t<t1) t1=t; } }
  }
  return [[x1+t0*dx, y1+t0*dy, x1+t1*dx, y1+t1*dy]];
}
// param range [tin,tout] (clamped to [0,1]) where segment lies INSIDE circle, or null
function dxfSegInCircle(x1,y1,x2,y2,cx,cy,r){
  const dx=x2-x1,dy=y2-y1, fx=x1-cx, fy=y1-cy;
  const a=dx*dx+dy*dy; if(a<1e-9) return (fx*fx+fy*fy<=r*r)?[0,1]:null;
  const b=2*(fx*dx+fy*dy), c=fx*fx+fy*fy-r*r;
  let disc=b*b-4*a*c; if(disc<0) return null; disc=Math.sqrt(disc);
  let ta=(-b-disc)/(2*a), tb=(-b+disc)/(2*a);
  ta=Math.max(0,ta); tb=Math.min(1,tb);
  return (tb>ta)?[ta,tb]:null;
}
// clip segment to an annulus (inside rOut, outside rIn) -> list of [x1,y1,x2,y2]
function dxfClipAnnulus(x1,y1,x2,y2,c){
  const inOut=dxfSegInCircle(x1,y1,x2,y2,c.cx,c.cy,c.rOut); if(!inOut) return [];
  const dx=x2-x1,dy=y2-y1, mk=(a,b)=>[x1+a*dx,y1+a*dy,x1+b*dx,y1+b*dy];
  const inIn=dxfSegInCircle(x1,y1,x2,y2,c.cx,c.cy,c.rIn);
  if(!inIn) return [mk(inOut[0],inOut[1])];   // no inner overlap
  const out=[];
  if(inIn[0]>inOut[0]) out.push(mk(inOut[0], Math.min(inIn[0],inOut[1])));   // before inner disk
  if(inIn[1]<inOut[1]) out.push(mk(Math.max(inIn[1],inOut[0]), inOut[1]));   // after inner disk
  return out.filter(s=>Math.hypot(s[2]-s[0],s[3]-s[1])>0.05);
}
function dxfClip(x1,y1,x2,y2,clip){
  if(!clip) return [[x1,y1,x2,y2]];
  if(clip.type==='rect') return dxfClipRect(x1,y1,x2,y2,clip);
  if(clip.type==='annulus') return dxfClipAnnulus(x1,y1,x2,y2,clip);
  if(clip.type==='circle'){ const t=dxfSegInCircle(x1,y1,x2,y2,clip.cx,clip.cy,clip.r); return t?[[x1+t[0]*(x2-x1),y1+t[0]*(y2-y1),x1+t[1]*(x2-x1),y1+t[1]*(y2-y1)]]:[]; }
  return [[x1,y1,x2,y2]];
}
function DxfRec(mctx){
  this.mctx=mctx; this.layer='0';
  this.s={fill:'#000',stroke:'#111418',lw:1,font:'10px Arial',align:'left',baseline:'alphabetic'};
  this.stack=[]; this.clipStack=[]; this.clipRgn=null;
  this.prims=[]; this.cur=null;
  this.lines=[]; this.circles=[]; this.texts=[];
}
DxfRec.prototype = {
  save(){ this.stack.push(Object.assign({},this.s)); this.clipStack.push(this.clipRgn); },
  restore(){ if(this.stack.length){ this.s=this.stack.pop(); this.clipRgn=this.clipStack.pop(); } },
  get fillStyle(){return this.s.fill;}, set fillStyle(v){this.s.fill=v;},
  get strokeStyle(){return this.s.stroke;}, set strokeStyle(v){this.s.stroke=v;},
  get lineWidth(){return this.s.lw;}, set lineWidth(v){this.s.lw=v;},
  get font(){return this.s.font;}, set font(v){this.s.font=v;},
  get textAlign(){return this.s.align;}, set textAlign(v){this.s.align=v;},
  get textBaseline(){return this.s.baseline;}, set textBaseline(v){this.s.baseline=v;},
  set lineJoin(v){}, set lineCap(v){}, setLineDash(){}, scale(){}, translate(){}, setTransform(){},
  beginPath(){ this.prims=[]; this.cur=null; },
  moveTo(x,y){ this.cur={kind:'poly',pts:[[x,y]]}; this.prims.push(this.cur); },
  lineTo(x,y){ if(!this.cur||this.cur.kind!=='poly'){ this.cur={kind:'poly',pts:[[x,y]]}; this.prims.push(this.cur); } else this.cur.pts.push([x,y]); },
  closePath(){ if(this.cur&&this.cur.kind==='poly'&&this.cur.pts.length>1) this.cur.pts.push(this.cur.pts[0].slice()); },
  rect(x,y,w,h){ this.prims.push({kind:'poly',pts:[[x,y],[x+w,y],[x+w,y+h],[x,y+h],[x,y]]}); this.cur=null; },
  arc(cx,cy,r){ this.prims.push({kind:'circle',cx,cy,r}); this.cur=null; },   // render path uses full circles
  ellipse(cx,cy,rx,ry,rot){ const pts=[],n=44; for(let i=0;i<=n;i++){ const t=i/n*Math.PI*2,ex=Math.cos(t)*rx,ey=Math.sin(t)*ry; pts.push([cx+ex*Math.cos(rot)-ey*Math.sin(rot), cy+ex*Math.sin(rot)+ey*Math.cos(rot)]); } this.prims.push({kind:'poly',pts}); this.cur=null; },
  measureText(t){ if(this.mctx){ this.mctx.font=this.s.font; return this.mctx.measureText(t); } return {width:(t||'').length*6}; },
  stroke(){ for(const p of this.prims) this._emit(p); },
  fill(){ if(dxfIsWhite(this.s.fill)) return; for(const p of this.prims){ if(p.kind==='poly'){ const pts=p.pts.slice(); if(pts.length>1 && (pts[0][0]!==pts[pts.length-1][0]||pts[0][1]!==pts[pts.length-1][1])) pts.push(pts[0]); this._poly(pts); } else this._emit(p); } },
  fillRect(){},                          // white bases / masks -> nothing in DXF
  strokeRect(x,y,w,h){ this._poly([[x,y],[x+w,y],[x+w,y+h],[x,y+h],[x,y]]); },
  clip(){ this.clipRgn=this._clip(this.prims); },
  fillText(t,x,y){ const h=parseFloat((this.s.font.match(/([\d.]+)px/)||[])[1]||10); this.texts.push({x,y,h,val:String(t),align:this.s.align,baseline:this.s.baseline,layer:this.layer}); },
  _emit(p){ if(p.kind==='poly') this._poly(p.pts); else if(p.kind==='circle') this._circle(p.cx,p.cy,p.r); },
  _poly(pts){ for(let i=0;i+1<pts.length;i++) this._line(pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1]); },
  _line(x1,y1,x2,y2){ for(const s of dxfClip(x1,y1,x2,y2,this.clipRgn)) this.lines.push([s[0],s[1],s[2],s[3],this.layer]); },
  _circle(cx,cy,r){ if(this.clipRgn&&this.clipRgn.type==='rect'&&(cx<this.clipRgn.x0||cx>this.clipRgn.x1||cy<this.clipRgn.y0||cy>this.clipRgn.y1)) return; this.circles.push([cx,cy,r,this.layer]); },
  _clip(prims){
    const polys=prims.filter(p=>p.kind==='poly'), circ=prims.filter(p=>p.kind==='circle');
    if(circ.length>=2){ const rs=circ.map(c=>c.r).sort((a,b)=>a-b); return {type:'annulus',cx:circ[0].cx,cy:circ[0].cy,rIn:rs[0],rOut:rs[rs.length-1]}; }
    if(circ.length===1) return {type:'circle',cx:circ[0].cx,cy:circ[0].cy,r:circ[0].r};
    let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9; for(const p of polys) for(const pt of p.pts){ x0=Math.min(x0,pt[0]);y0=Math.min(y0,pt[1]);x1=Math.max(x1,pt[0]);y1=Math.max(y1,pt[1]); }
    return {type:'rect',x0,y0,x1,y1};
  },
  toDXF(){
    const FY=y=>(H-y).toFixed(3), X=x=>x.toFixed(3);
    const layers=['BORDER','STRUCTURE','FASTENER','ROD','SURGE','HANGER','PIPE','KEYNOTES','LEADERS','TEXT','TITLE'];
    const colors={BORDER:7,STRUCTURE:8,FASTENER:3,ROD:5,SURGE:6,HANGER:1,PIPE:1,KEYNOTES:2,LEADERS:7,TEXT:7,TITLE:7};
    let o=[];
    o.push('0','SECTION','2','TABLES','0','TABLE','2','LAYER','70',String(layers.length));
    for(const L of layers){ o.push('0','LAYER','2',L,'70','0','62',String(colors[L]||7),'6','CONTINUOUS'); }
    o.push('0','ENDTAB','0','ENDSEC','0','SECTION','2','ENTITIES');
    for(const l of this.lines){ o.push('0','LINE','8',l[4],'10',X(l[0]),'20',FY(l[1]),'30','0','11',X(l[2]),'21',FY(l[3]),'31','0'); }
    for(const c of this.circles){ o.push('0','CIRCLE','8',c[3],'10',X(c[0]),'20',FY(c[1]),'30','0','40',c[2].toFixed(3)); }
    for(const t of this.texts){
      const h=(t.h*0.72).toFixed(3);
      const halign=t.align==='center'?1:(t.align==='right'?2:0);
      const valign=t.baseline==='middle'?2:(t.baseline==='top'?3:(t.baseline==='bottom'?1:0));
      o.push('0','TEXT','8','TEXT','10',X(t.x),'20',FY(t.y),'30','0','40',h,'1',t.val,'72',String(halign),'73',String(valign),'11',X(t.x),'21',FY(t.y),'31','0');
    }
    o.push('0','ENDSEC','0','EOF');
    return o.join('\n');
  }
};
function exportDXF(){
  if(!state.pipe){ flash("Add a pipe before exporting."); return; }
  const mctx=document.createElement('canvas').getContext('2d');
  const r=new DxfRec(mctx);
  const G=state.pipe?geom():null;
  r.layer='BORDER';    drawBorder(r);
  r.layer='STRUCTURE'; drawStructure(r);
  r.layer='FASTENER';  drawFastener(r);
  r.layer='ROD';       drawRod(r);
  r.layer='SURGE';     drawSurge(r);
  r.layer='HANGER';    if(state.ring && G && G.rd) drawRealRing(r, state.pipe.x, state.pipe.y, G.rd);
  r.layer='PIPE';      if(G) drawPipeSection(r, state.pipe.x, state.pipe.y, G.pipeR);
  r.layer='KEYNOTES';  drawKeynotes(r);
  r.layer='TITLE';     drawTitleBlock(r);
  const dxf=r.toDXF();
  const blob=new Blob([dxf],{type:'application/dxf'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const name=(state.title.replace(/[^a-z0-9]+/gi,'_').slice(0,40)||'hanger_detail');
  a.href=url; a.download=name+'.dxf';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),4000);
  flash("DXF exported ✓");
}
document.getElementById('btnDxf').onclick=exportDXF;

/* ============================================================
   Export PNG (hi-res, white paper)
   ============================================================ */
document.getElementById('btnExport').onclick=()=>{
  if(!state.pipe){ flash("Add a pipe before exporting."); return; }
  const scale=3;
  const ex=document.createElement('canvas');
  ex.width=W*scale; ex.height=H*scale;
  const eg=ex.getContext('2d');
  eg.scale(scale,scale);
  render(eg,{paper:true});
  ex.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const name=(state.title.replace(/[^a-z0-9]+/gi,'_').slice(0,40)||'hanger_detail');
    a.href=url; a.download=name+'.png';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
  },'image/png');
  flash("PNG exported ✓");
};

pendingNps = DEFAULT_NPS;
(function(){ const r=pipeYRange(DEFAULT_NPS); state.pipe={ x:AXIS, y:clamp(600, r[0], r[1]), npsIndex:DEFAULT_NPS }; })();
state.ring = true;
state.structure = 'woodbeam';
state.fastener = 'woodside';
updateUI();
fitCanvas();
