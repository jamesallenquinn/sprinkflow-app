<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NFPA 13 References — SprinkFlow</title>
  <meta name="theme-color" content="#0d1116" />
  <link rel="manifest" href="../manifest.webmanifest" />
  <link rel="icon" href="../assets/icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <header class="app-bar">
    <a class="back" href="../index.html" aria-label="Back">‹</a>
    <div><div class="title">NFPA 13 References</div><div class="sub">Common sections across editions</div></div>
  </header>

  <main class="tool-page">
    <div class="field">
      <input id="q" type="search" inputmode="search" placeholder="Search topic — e.g. bathroom, closet, antifreeze" autocomplete="off" />
    </div>
    <div id="list"></div>
    <p class="hint" id="empty">Search common NFPA 13 references (sprinkler omissions, spacing, special provisions) and see the matching section numbers across the 2016, 2019, 2022, and 2025 editions.</p>
  </main>

  <style>
    .ref { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
    .ref h3 { margin: 0 0 4px; font-size: 1.02rem; }
    .ref .cat { color: var(--accent); font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
    .eds { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-top: 12px; }
    .ed { background: var(--bg); border: 1px solid var(--line); border-radius: 9px; padding: 8px 10px; }
    .ed .yr { color: var(--muted); font-size: 0.72rem; }
    .ed .sec { font-family: "Space Grotesk", sans-serif; font-weight: 700; font-size: 0.95rem; }
    mark { background: rgba(255,176,58,0.35); color: inherit; border-radius: 3px; }
  </style>
  <script>
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("../sw.js").catch(()=>{});
    let REFS = [];
    const EDITIONS = ["2016","2019","2022","2025"];
    fetch("../data/nfpa13_common_references.json", { cache: "no-store" })
      .then(r => r.json()).then(d => { REFS = d.references || []; render(""); })
      .catch(() => { document.getElementById("empty").textContent = "Could not load references (offline and not cached yet)."; });

    const norm = s => String(s||"").toLowerCase();
    function matches(ref, q){
      if (!q) return true;
      const hay = [ref.name, ref.category, ...(ref.tags||[]), ...EDITIONS.flatMap(e => ref.sections?.[e]||[])].map(norm).join(" ");
      return q.split(/\s+/).filter(Boolean).every(t => hay.includes(t));
    }
    function hl(text, q){
      if (!q) return text;
      const terms = q.split(/\s+/).filter(Boolean).map(t => t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"));
      if (!terms.length) return text;
      return text.replace(new RegExp("("+terms.join("|")+")","ig"), "<mark>$1</mark>");
    }
    function render(q){
      const ql = norm(q);
      const out = REFS.filter(r => matches(r, ql));
      const empty = document.getElementById("empty");
      if (!REFS.length) return;
      empty.style.display = out.length ? "none" : "block";
      if (!out.length) { empty.textContent = `No references match "${q}".`; document.getElementById("list").innerHTML=""; return; }
      document.getElementById("list").innerHTML = out.map(r => `
        <div class="ref">
          <div class="cat">${hl(r.category||"Reference", ql)}</div>
          <h3>${hl(r.name, ql)}</h3>
          <div class="eds">
            ${EDITIONS.map(e => `<div class="ed"><div class="yr">${e}</div><div class="sec">${(r.sections?.[e]||["—"]).join(", ")}</div></div>`).join("")}
          </div>
        </div>`).join("");
    }
    document.getElementById("q").addEventListener("input", e => render(e.target.value));
  </script>
  <script src="./sprinkflow-auth.js"></script>
</body>
</html>
