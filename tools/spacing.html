<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sprinkler Spacing — SprinkFlow</title>
  <meta name="theme-color" content="#0d1116" />
  <link rel="manifest" href="../manifest.webmanifest" />
  <link rel="icon" href="../assets/icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <header class="app-bar">
    <a class="back" href="../index.html" aria-label="Back">‹</a>
    <div><div class="title">Sprinkler Spacing</div><div class="sub">Coverage area &amp; required flow</div></div>
  </header>

  <main class="tool-page">
    <div class="field"><label>Along branch lines (X)</label>
      <select id="xMode" style="margin-bottom:10px"><option value="between">Distance between sprinklers</option><option value="wall">Distance to wall</option></select>
      <div class="row3">
        <input id="xFt" type="number" inputmode="numeric" min="0" placeholder="ft" />
        <input id="xIn" type="number" inputmode="numeric" min="0" placeholder="in" />
        <select id="xFr" aria-label="X fraction of an inch"></select>
      </div>
    </div>

    <div class="field"><label>Between branch lines (Y)</label>
      <select id="yMode" style="margin-bottom:10px"><option value="between">Distance between branch lines</option><option value="wall">Distance to wall</option></select>
      <div class="row3">
        <input id="yFt" type="number" inputmode="numeric" min="0" placeholder="ft" />
        <input id="yIn" type="number" inputmode="numeric" min="0" placeholder="in" />
        <select id="yFr" aria-label="Y fraction of an inch"></select>
      </div>
    </div>

    <div class="result-card">
      <div class="lbl">Coverage area per sprinkler</div>
      <div class="big" id="area">— sq ft</div>
      <div class="result-row" style="color:var(--muted)"><span>Effective dimensions</span><span class="v" id="dims">—</span></div>
      <div id="rows"></div>
      <div class="field" style="margin-top:16px;margin-bottom:0"><label>Custom density (gpm/sq ft)</label>
        <input id="customDensity" type="number" inputmode="decimal" placeholder="e.g. 0.20" />
      </div>
    </div>
    <p class="hint">Enter feet, inches, and a fraction for each spacing. "Distance to wall" is doubled to get the effective coverage dimension (per NFPA 13). Required flow = coverage area × density.</p>
  </main>

  <script>
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("../sw.js").catch(()=>{});
    // eighth-inch fractions (covers half inches and more)
    const FRACTS = [
      ["0", 0], ["1/8\"", 0.125], ["1/4\"", 0.25], ["3/8\"", 0.375],
      ["1/2\"", 0.5], ["5/8\"", 0.625], ["3/4\"", 0.75], ["7/8\"", 0.875]
    ];
    for (const sel of ["xFr","yFr"]) {
      document.getElementById(sel).innerHTML = FRACTS.map(([lbl,v]) => `<option value="${v}">${lbl}</option>`).join("");
    }
    const num = id => { const v = parseFloat(document.getElementById(id).value); return Number.isFinite(v) ? v : 0; };
    // axis length in decimal feet from ft + in + fraction
    function axisFeet(p){ return num(p+"Ft") + (num(p+"In") + parseFloat(document.getElementById(p+"Fr").value)) / 12; }
    function effective(mode, feet){ return mode === "wall" ? feet * 2 : feet; }
    function fmtFI(feet){
      const totalIn = Math.round(feet * 12 * 8) / 8; // nearest 1/8"
      const ft = Math.floor(totalIn / 12);
      const inch = totalIn - ft * 12;
      return `${ft}'-${(inch % 1 === 0) ? inch : inch.toFixed(3).replace(/0+$/,'')}"`;
    }
    const HAZARDS = [
      { name: "Light Hazard", density: 0.10 },
      { name: "Ordinary Hazard 1", density: 0.15 },
      { name: "Ordinary Hazard 2", density: 0.20 },
      { name: "Extra Hazard 1", density: 0.30 },
      { name: "Extra Hazard 2", density: 0.40 },
    ];
    function update(){
      const x = effective(document.getElementById("xMode").value, axisFeet("x"));
      const y = effective(document.getElementById("yMode").value, axisFeet("y"));
      const area = x * y;
      document.getElementById("area").textContent = area > 0 ? area.toFixed(2) + " sq ft" : "— sq ft";
      document.getElementById("dims").textContent = (x > 0 && y > 0) ? `${fmtFI(x)} × ${fmtFI(y)}` : "—";
      const rows = HAZARDS.map(h => ({ name: h.name, d: h.density.toFixed(2), gpm: area > 0 ? (area*h.density).toFixed(2) : "—" }));
      const cd = parseFloat(document.getElementById("customDensity").value);
      if (Number.isFinite(cd) && cd > 0) rows.push({ name: "Custom", d: cd.toFixed(3), gpm: area > 0 ? (area*cd).toFixed(2) : "—" });
      document.getElementById("rows").innerHTML = rows.map(r =>
        `<div class="result-row"><span>${r.name} <small style="color:var(--line-strong)">(${r.d})</small></span><span class="v">${r.gpm}${r.gpm!=="—"?" gpm":""}</span></div>`).join("");
    }
    document.querySelectorAll("input,select").forEach(el => el.addEventListener("input", update));
    update();
  </script>
</body>
</html>
