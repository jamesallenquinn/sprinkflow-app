<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Feet / Inch Calculator — SprinkFlow</title>
  <meta name="theme-color" content="#0d1116" />
  <link rel="manifest" href="../manifest.webmanifest" />
  <link rel="icon" href="../assets/icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <header class="app-bar">
    <a class="back" href="../index.html" aria-label="Back">‹</a>
    <div><div class="title">Feet / Inch</div><div class="sub">Add, subtract &amp; convert</div></div>
  </header>

  <main class="tool-page">
    <div class="field"><label>Measurement A</label>
      <div class="row3">
        <input id="aFt" type="number" inputmode="numeric" placeholder="ft" />
        <input id="aIn" type="number" inputmode="numeric" placeholder="in" />
        <select id="aFr"></select>
      </div>
    </div>

    <div class="field"><label>Operation</label>
      <select id="op"><option value="add">A + B</option><option value="sub">A − B</option></select>
    </div>

    <div class="field"><label>Measurement B</label>
      <div class="row3">
        <input id="bFt" type="number" inputmode="numeric" placeholder="ft" />
        <input id="bIn" type="number" inputmode="numeric" placeholder="in" />
        <select id="bFr"></select>
      </div>
    </div>

    <div class="result-card">
      <div class="lbl">Result</div>
      <div class="big" id="rFI">0'-0"</div>
      <div class="result-row"><span>Decimal feet</span><span class="v" id="rDec">0.000 ft</span></div>
      <div class="result-row"><span>Total inches</span><span class="v" id="rIn">0.000 in</span></div>
    </div>
    <p class="hint">Fractions round to the nearest 1/16". Leave fields blank for zero.</p>
  </main>

  <style>
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1.3fr; gap: 10px; }
  </style>
  <script>
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("../sw.js").catch(()=>{});
    const FRACTS = Array.from({length:16},(_,i)=>i); // 0..15 sixteenths
    function fracLabel(n){ if(n===0) return "0"; const g=(a,b)=>b?g(b,a%b):a; const d=g(n,16); return (n/d)+"/"+(16/d); }
    for (const sel of ["aFr","bFr"]) {
      const el=document.getElementById(sel);
      el.innerHTML = FRACTS.map(n=>`<option value="${n}">${fracLabel(n)}"</option>`).join("");
    }
    function val(id){ const v=parseFloat(document.getElementById(id).value); return Number.isFinite(v)?v:0; }
    function inchesOf(p){ return val(p+"Ft")*12 + val(p+"In") + Number(document.getElementById(p+"Fr").value)/16; }
    function fmtFeetInches16(totalInches){
      const sign = totalInches<0 ? "-" : "";
      let t = Math.abs(totalInches);
      let sixteenths = Math.round(t*16);
      let feet = Math.floor(sixteenths/192);
      sixteenths -= feet*192;
      let inch = Math.floor(sixteenths/16);
      let frac = sixteenths - inch*16;
      let fracStr = frac ? " "+fracLabel(frac) : "";
      return `${sign}${feet}'-${inch}${fracStr}"`;
    }
    function update(){
      const a=inchesOf("a"), b=inchesOf("b");
      const op=document.getElementById("op").value;
      const total = op==="sub" ? a-b : a+b;
      document.getElementById("rFI").textContent = fmtFeetInches16(total);
      document.getElementById("rDec").textContent = (total/12).toFixed(3)+" ft";
      document.getElementById("rIn").textContent = total.toFixed(3)+" in";
    }
    document.querySelectorAll("input,select").forEach(el=>el.addEventListener("input",update));
    update();
  </script>
</body>
</html>
